function bindAdminUsers() {
  // Rol wijzigen
  document.querySelectorAll('.role-toggle-btn').forEach(b => b.addEventListener('click', async () => {
    const newRole = b.dataset.newrole;
    const name = b.dataset.name;
    const label = newRole === 'admin' ? 'beheerder' : 'monteur';
    if (!confirm(`Weet je zeker dat je ${name} de rol "${label}" wilt geven?`)) return;
    try {
      const updated = await api('PUT', `/api/admin/users/${b.dataset.id}/role`, { role: newRole });
      S.users = S.users.map(u => u.id === updated.id ? { ...u, role: updated.role } : u);
      S.success = `${name} is nu ${label}.`;
      render();
    } catch(e) { S.error = e.message; render(); }
  }));
  document.querySelectorAll('.edit-user-btn').forEach(b => b.addEventListener('click', () => {
    const u = S.users.find(x => x.id === b.dataset.id);
    S.modal = { type: 'userForm', title: 'Gebruiker bewerken', user: u };
    render();
  }));
  document.querySelectorAll('.reset-pw-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'resetPw', title: `Wachtwoord resetten – ${b.dataset.name}`, userId: b.dataset.id };
    render();
  }));
  document.querySelectorAll('.del-user-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'confirm', title: 'Gebruiker verwijderen', message: `Weet je zeker dat je <strong>${b.dataset.name}</strong> wilt verwijderen?`, action: 'deleteUser', id: b.dataset.id };
    render();
  }));
}

function openSubDetail(sid) {
  const s = (S.allSubmissions || []).find(x => x.id === sid);
  if (!s) return;
  const form = S.forms.find(f => f.id === s.formId);
  const fields = form?.fields || [];
  const monteur = S.users.find(u => u.id === s.userId);
  const d = new Date(s.submittedAt);
  const datum = d.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const tijd  = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });

  let details = `
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:120px">
        <div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Monteur</div>
        <div style="font-size:14px;font-weight:600">${esc(monteur?.name || s.userName || '—')}</div>
      </div>
      <div style="flex:1;min-width:120px">
        <div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Datum &amp; tijd</div>
        <div style="font-size:14px">${datum} om ${tijd}</div>
      </div>
      <div style="width:100%">
        <div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Status aanpassen</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm sub-status-btn ${!s.status||s.status==='nieuw'?'btn-primary':''}" data-sid="${s.id}" data-status="nieuw" style="${!s.status||s.status==='nieuw'?'':'background:#EFF6FF;color:#1D4ED8'}">● Nieuw</button>
          <button class="btn btn-sm sub-status-btn ${s.status==='in-behandeling'?'btn-primary':''}" data-sid="${s.id}" data-status="in-behandeling" style="${s.status==='in-behandeling'?'':'background:#FEF3C7;color:#D97706'}">⟳ In behandeling</button>
          <button class="btn btn-sm sub-status-btn ${s.status==='verwerkt'?'btn-success':''}" data-sid="${s.id}" data-status="verwerkt" style="${s.status==='verwerkt'?'':'background:#DCFCE7;color:#16A34A'}">✓ Verwerkt</button>
        </div>
      </div>
    </div>`;

  details += fields.filter(f => !['photo','signature','heading','divider'].includes(f.type)).map(f => {
    const val = s.data?.[f.id];
    let display = '—';
    if (f.type === 'checkbox' && Array.isArray(val)) display = val.join(', ') || '—';
    else if (val !== undefined && val !== null && val !== '') display = String(val);
    return `<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px">${esc(f.label?.split('\n')[0] || '')}</div>
      <div style="font-size:14px;padding:6px 0;border-bottom:1px solid var(--border)">${esc(display)}</div>
    </div>`;
  }).join('');

  if (s.photoCount > 0) {
    if (s.photoUrls && s.photoUrls.length > 0) {
      details += `<div style="margin-top:16px">
        <div style="font-weight:700;font-size:13px;color:var(--text-muted);margin-bottom:8px">📷 FOTO'S (${s.photoUrls.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px">
          ${s.photoUrls.map(url => `
            <a href="${url}" target="_blank" rel="noopener" style="display:block;width:110px;height:110px;border-radius:10px;overflow:hidden;border:2px solid var(--border);flex-shrink:0">
              <img src="${url}" style="width:100%;height:100%;object-fit:cover" loading="lazy"
                onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:28px;background:#f1f5f9\\'>📷</div>'">
            </a>`).join('')}
        </div>
      </div>`;
    } else {
      details += `<div style="margin-top:8px"><span class="badge badge-blue">📷 ${s.photoCount} foto('s) meegestuurd</span></div>`;
    }
  }
  if (s.hasSignature) details += `<div style="margin-top:6px"><span class="badge badge-green">✓ Handtekening meegestuurd</span></div>`;

  S.modal = { type: 'submissionDetail', title: `${s.formName || 'Inzending'} — ${statusBadge(s.status)}`, content: details };
  render();
}

function bindAdminSubmissions() {
  document.getElementById('subFilterForm')?.addEventListener('change', e => {
    S.subFilterForm = e.target.value; render();
  });
  document.getElementById('subFilterUser')?.addEventListener('change', e => {
    S.subFilterUser = e.target.value; render();
  });
  document.getElementById('subFilterStatus')?.addEventListener('change', e => {
    S.subFilterStatus = e.target.value; render();
  });
  document.getElementById('clearSubFilter')?.addEventListener('click', () => {
    S.subFilterForm = ''; S.subFilterUser = ''; S.subFilterStatus = ''; S.subSearchQ = ''; render();
  });
  // Live zoeken (debounced)
  let _subSearchTimer;
  document.getElementById('subSearch')?.addEventListener('input', e => {
    clearTimeout(_subSearchTimer);
    _subSearchTimer = setTimeout(() => { S.subSearchQ = e.target.value; render(); }, 250);
  });
  document.querySelectorAll('.admin-sub-detail-btn').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    openSubDetail(b.dataset.sid);
  }));
  document.querySelectorAll('.admin-sub-row').forEach(row => row.addEventListener('click', () => {
    openSubDetail(row.dataset.sid);
  }));
}

// Status-knoppen in de detail modal binden (aangeroepen vanuit bindModal)
function bindSubmissionStatusBtns() {
  document.querySelectorAll('.sub-status-btn').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const sid = btn.dataset.sid;
    const status = btn.dataset.status;
    try {
      const updated = await api('PUT', `/api/admin/submissions/${sid}/status`, { status });
      // Update lokaal
      const idx = (S.allSubmissions || []).findIndex(s => s.id === sid);
      if (idx !== -1) S.allSubmissions[idx].status = updated.status;
      S.modal = null;
      S.success = `Status gewijzigd naar "${status}".`;
      render();
    } catch(e) { S.error = e.message; render(); }
  }));
}

// --- ADMIN LISTS ---
function renderAdminLists() {
  return `
  <div class="section-header">
    <h2 class="section-title">Lijsten</h2>
  </div>
  <div class="card">
    <p class="card-title" style="margin-bottom:12px">Lijst uploaden</p>
    <p class="text-sm text-muted" style="margin-bottom:14px">Upload een CSV of Excel-bestand (.xlsx). De eerste kolom wordt gebruikt als keuzelijst.</p>
    <div class="form-group">
      <label>Naam van de lijst</label>
      <input class="form-control" id="listName" type="text" placeholder="bijv. Klantenlijst, Materialen...">
    </div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="listFile" accept=".csv,.xlsx,.xls,.txt">
      <div class="upload-icon">📂</div>
      <p class="upload-text">Klik om bestand te kiezen</p>
      <p class="upload-sub">CSV, Excel (.xlsx) of tekst (.txt)</p>
      <p id="selectedFileName" class="text-sm" style="margin-top:8px;color:var(--blue);font-weight:600"></p>
    </div>
    <button class="btn btn-primary" id="uploadListBtn" style="margin-top:12px">⬆ Lijst uploaden</button>
  </div>

  ${S.lists.length > 0 ? `
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
      <p class="card-title">Geüploade lijsten</p>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Naam</th><th>Items</th><th>Geüpload op</th><th></th></tr></thead>
        <tbody>
          ${S.lists.map(l => `<tr>
            <td><strong>${esc(l.name)}</strong></td>
            <td><span class="badge badge-blue">${l.count} items</span></td>
            <td class="text-sm text-muted">${new Date(l.uploadedAt).toLocaleDateString('nl-NL')}</td>
            <td>
              <div class="flex gap-1">
                <button class="btn btn-ghost btn-sm rename-list-btn" data-id="${l.id}" data-name="${esc(l.name)}">✏️</button>
                <button class="btn btn-danger btn-sm del-list-btn" data-id="${l.id}" data-name="${esc(l.name)}">🗑</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>` : ''}`;
}

function bindAdminLists() {
  const zone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('listFile');

  zone?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', () => {
    document.getElementById('selectedFileName').textContent = fileInput.files[0]?.name || '';
  });

  ['dragover','dragleave','drop'].forEach(evt => zone?.addEventListener(evt, e => {
    e.preventDefault();
    if (evt === 'dragover') zone.classList.add('dragover');
    else if (evt === 'dragleave') zone.classList.remove('dragover');
    else { zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; document.getElementById('selectedFileName').textContent = e.dataTransfer.files[0].name; } }
  }));

  document.getElementById('uploadListBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('listName')?.value?.trim();
    const file = fileInput?.files[0];
    if (!file) { S.error = 'Selecteer eerst een bestand'; render(); return; }
    S.loading = true; S.error = null; render();
    try {
      const fd = new FormData();
      fd.append('file', file);
      if (name) fd.append('name', name);
      const newList = await api('POST', '/api/admin/lists/upload', fd, true);
      S.lists.push(newList);
      S.success = `Lijst "${newList.name}" geüpload met ${newList.count} items!`;
      S.loading = false; render();
    } catch(e) { S.error = e.message; S.loading = false; render(); }
  });

  document.querySelectorAll('.rename-list-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'renameList', id: b.dataset.id, currentName: b.dataset.name };
    render();
  }));

  document.querySelectorAll('.del-list-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'confirm', title: 'Lijst verwijderen', message: `Weet je zeker dat je <strong>${b.dataset.name}</strong> wilt verwijderen?`, action: 'deleteList', id: b.dataset.id };
    render();
  }));
}

            <div class="user-check-item">

      <div class="form-group"><label>Nieuw wachtwoord</label><input class="form-control" id="adminNewPw" type="password" placeholder="Minimaal 6 tekens"></div>
      <div class="form-group"><label>Bevestigen</label><input class="form-control" id="adminNewPw2" type="password" placeholder="Herhaal wachtwoord"></div>
      <div class="flex gap-1" style="justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost" id="modalClose2">Annuleren</button>
        <button class="btn btn-primary" id="modalResetPwBtn">Wachtwoord opslaan</button>
      </div>`;
  } else if (m.type === 'renameList') {
    content = `
      <div class="modal-header"><h3 class="modal-title">Lijst hernoemen</h3><button class="modal-close" id="modalClose">×</button></div>
      <div class="form-group"><label>Nieuwe naam</label><input class="form-control" id="newListName" type="text" value="${esc(m.currentName)}"></div>
      <div class="flex gap-1" style="justify-content:flex-end">

function bindModal() {
  const m = S.modal;
  const close = () => { S.modal = null; S.error = null; render(); };
  document.getElementById('modalClose')?.addEventListener('click', close);
  document.getElementById('modalClose2')?.addEventListener('click', close);
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') close(); });

  // Status-knoppen in inzending detail modal
  if (m.type === 'submissionDetail') bindSubmissionStatusBtns();

  if (m.type === 'confirm') {
    document.getElementById('modalConfirm')?.addEventListener('click', async () => {
      try {
        if (m.action === 'deleteForm') {
          await api('DELETE', `/api/admin/forms/${m.id}`);
          S.forms = S.forms.filter(f => f.id !== m.id);
          S.success = 'Formulier verwijderd.';
        } else if (m.action === 'deleteUser') {
          await api('DELETE', `/api/admin/users/${m.id}`);
          S.users = S.users.filter(u => u.id !== m.id);
          S.success = 'Gebruiker verwijderd.';
        } else if (m.action === 'deleteList') {
          await api('DELETE', `/api/admin/lists/${m.id}`);
          S.lists = S.lists.filter(l => l.id !== m.id);
          S.success = 'Lijst verwijderd.';
        }
        S.modal = null; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'userForm') {
    document.getElementById('modalSaveUser')?.addEventListener('click', async () => {
      const name = document.getElementById('mu_name')?.value?.trim();
      const username = document.getElementById('mu_username')?.value?.trim();
      const pass = document.getElementById('mu_pass')?.value;
      const allowedForms = Array.from(document.querySelectorAll('.mu-form-check:checked')).map(c => c.dataset.fid);
      if (!name || !username) { S.error = 'Vul naam en gebruikersnaam in'; render(); return; }
      if (!m.user && !pass) { S.error = 'Wachtwoord is verplicht voor nieuwe gebruikers'; render(); return; }
      try {
        const payload = { name, username, role: 'monteur', allowedForms, ...(pass ? { password: pass } : {}) };
        let saved;
        if (m.user) { saved = await api('PUT', `/api/admin/users/${m.user.id}`, payload); S.users = S.users.map(u => u.id === saved.id ? saved : u); }
        else { saved = await api('POST', '/api/admin/users', payload); S.users.push(saved); }
        S.modal = null; S.success = `Gebruiker "${name}" opgeslagen.`; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'resetPw') {
    document.getElementById('modalResetPwBtn')?.addEventListener('click', async () => {
      const pw = document.getElementById('adminNewPw')?.value;
      const pw2 = document.getElementById('adminNewPw2')?.value;
      if (!pw) { S.error = 'Vul een wachtwoord in'; render(); return; }
      if (pw !== pw2) { S.error = 'Wachtwoorden komen niet overeen'; render(); return; }
      try {
        await api('POST', `/api/admin/users/${m.userId}/reset-password`, { password: pw });
        S.modal = null; S.success = 'Wachtwoord succesvol gewijzigd.'; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'renameList') {
    document.getElementById('modalRenameList')?.addEventListener('click', async () => {
      const newName = document.getElementById('newListName')?.value?.trim();
      if (!newName) return;
      try {
        const updated = await api('PUT', `/api/admin/lists/${m.id}`, { name: newName });
        S.lists = S.lists.map(l => l.id === m.id ? { ...l, name: newName } : l);
        S.modal = null; S.success = 'Lijstnaam bijgewerkt.'; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }
}

async function loadMonteurData() {
  const [forms, submissions, profile] = await Promise.all([
    api('GET', '/api/forms'),
    api('GET', '/api/submissions'),
    api('GET', '/api/profile')
  ]);
  S.myForms = forms;
  S.mySubmissions = submissions.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
  S.myProfile = profile;
}

const TILE_GRADIENTS = [
  'linear-gradient(135deg,#0B2540,#0057B8)',
  'linear-gradient(135deg,#4338CA,#7C3AED)',
  'linear-gradient(135deg,#0891B2,#06B6D4)',
  'linear-gradient(135deg,#059669,#10B981)',
  'linear-gradient(135deg,#D97706,#F59E0B)',
  'linear-gradient(135deg,#E11D48,#F43F5E)',
  'linear-gradient(135deg,#7C3AED,#EC4899)',
  'linear-gradient(135deg,#0E7490,#22D3EE)',
];
const TILE_EMOJIS = ['📋','📝','🔧','⚙️','🏗️','🔩','📐','🛠️','📊','🔍'];

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6)  return { text: 'Goedenacht', emoji: '🌙' };
  if (h < 12) return { text: 'Goedemorgen', emoji: '☀️' };
  if (h < 18) return { text: 'Goedemiddag', emoji: '👋' };
  return       { text: 'Goedenavond', emoji: '🌆' };
}

function renderMonteur() {
  if (S.fillingForm) return renderFormFill();
  const { text: greetText, emoji: greetEmoji } = getGreeting();
  const firstName = (S.user?.name || '').split(' ')[0];
  const todayStr = new Date().toDateString();
  const todayCount = (S.mySubmissions || []).filter(s => new Date(s.submittedAt).toDateString() === todayStr).length;

  return `
  ${renderTopNav()}
  <div class="tabs">
    <div class="tab ${S.monteurTab==='forms'?'active':''}" data-mtab="forms">🏠 Formulieren</div>
    <div class="tab ${S.monteurTab==='history'?'active':''}" data-mtab="history">📊 Mijn inzendingen</div>
    <div class="tab ${S.monteurTab==='profile'?'active':''}" data-mtab="profile">👤 Mijn profiel</div>
  </div>
  <div class="page-content">
    ${S.success ? `<div class="alert alert-success">✓ ${S.success}</div>` : ''}
    ${S.error ? `<div class="alert alert-error">⚠ ${S.error}</div>` : ''}

    ${S.monteurTab === 'forms' ? `
      <div class="greeting-hero">
        <div class="greeting-name">${greetText}, ${esc(firstName)}!</div>
        <div class="greeting-sub">Klaar voor vandaag? Kies een formulier om te starten.</div>
        <div class="greeting-emoji">${greetEmoji}</div>
        <div class="greeting-stats">
          <div class="greeting-stat-item">
            <div class="greeting-stat-num">${S.myForms.length}</div>
            <div class="greeting-stat-label">Formulieren</div>
          </div>
          <div class="greeting-stat-item">
            <div class="greeting-stat-num">${S.mySubmissions.length}</div>
            <div class="greeting-stat-label">Inzendingen</div>
          </div>
          <div class="greeting-stat-item">
            <div class="greeting-stat-num">${todayCount}</div>
            <div class="greeting-stat-label">Vandaag</div>
          </div>
        </div>
      </div>
      ${S.myForms.length === 0 ? `
        <div class="card" style="text-align:center;padding:52px 24px">
          <div style="font-size:56px;margin-bottom:14px;animation:floatBob 3s ease-in-out infinite">📭</div>
          <p class="empty-text" style="font-size:18px;margin-bottom:6px">Geen formulieren beschikbaar</p>
          <p class="empty-sub">Neem contact op met je beheerder om toegang te krijgen.</p>
        </div>` : `
      <div class="form-grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">
        ${S.myForms.map((f, fi) => {
          const grad = TILE_GRADIENTS[fi % TILE_GRADIENTS.length];
          const emoji = TILE_EMOJIS[fi % TILE_EMOJIS.length];
          const fieldCount = (f.fields||[]).length;
          const hasDraft = !!loadDraft(f.id);
          return `
          <div class="form-tile" data-id="${f.id}" style="animation:popIn 0.5s var(--ease-spring) ${fi * 0.06}s both;padding:0;text-align:left;overflow:hidden">
            ${hasDraft ? '<div class="draft-dot" title="Concept opgeslagen"></div>' : ''}
            <div class="form-tile-cover" style="background:${grad};height:88px">
              <span style="font-size:36px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));position:relative;z-index:1">${emoji}</span>
            </div>
            <div style="padding:14px 16px 16px">
              <div class="form-tile-name" style="font-size:14px;margin-bottom:4px;text-align:left">${esc(f.name)}</div>
              <div class="form-tile-fields" style="text-align:left">${fieldCount} veld${fieldCount!==1?'en':''}</div>
              <div style="margin-top:12px;display:flex;align-items:center;gap:6px">
                <span style="background:rgba(0,87,184,0.1);color:var(--blue);font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px">Invullen →</span>
                ${hasDraft ? '<span style="background:#FEF3C7;color:#D97706;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px">Concept</span>' : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    ` : ''}

    ${S.monteurTab === 'history' ? `
      <div class="section-header"><h2 class="section-title">Mijn inzendingen</h2>
        <span style="background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px">${S.mySubmissions.length} totaal</span>
      </div>
      ${S.mySubmissions.length === 0 ? `
        <div class="card" style="text-align:center;padding:52px 24px">
          <div style="font-size:56px;margin-bottom:14px;animation:floatBob 3s ease-in-out infinite">📭</div>
          <p class="empty-text" style="font-size:18px;margin-bottom:6px">Nog geen inzendingen</p>
          <p class="empty-sub">Ingevulde formulieren verschijnen hier.</p>
          <button class="btn btn-primary" style="margin-top:16px" onclick="S.monteurTab='forms';render()">Formulier invullen</button>
        </div>` : `
      <div>
        ${S.mySubmissions.map((s, i) => {
          const d = new Date(s.submittedAt);
          const datum = d.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
          const tijd = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
          const badges = [];
          if (s.photoCount > 0) badges.push(`📷 ${s.photoCount}`);
          if (s.hasSignature) badges.push('✍ Handtekening');
          return `
          <div class="history-card submission-row" data-sid="${s.id}" style="animation-delay:${i*0.04}s">
            <div class="history-card-icon">📋</div>
            <div class="history-card-content">
              <div class="history-card-name">${esc(s.formName)}</div>
              <div class="history-card-meta">
                <span>${datum}</span>
                <span style="opacity:0.5">·</span>
                <span>${tijd}</span>
                ${badges.map(b => `<span style="opacity:0.5">·</span><span>${b}</span>`).join('')}
              </div>
            </div>
            <div class="history-card-arrow">›</div>
          </div>`;
        }).join('')}
      </div>`}
    ` : ''}

    ${S.monteurTab === 'profile' ? renderMonteurProfile() : ''}
  </div>
  ${S.modal ? renderModal() : ''}`;
}

function bindMonteur() {
  document.getElementById('logoutBtn')?.addEventListener('click', logout);
  bindDarkToggle();
  document.querySelectorAll('.tab[data-mtab]').forEach(t => t.addEventListener('click', () => {
    S.monteurTab = t.dataset.mtab; S.error = null; S.success = null; render();
  }));

  // Profiel opslaan
  document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
    S.loading = true; S.error = null; S.success = null; render();
    try {
      const fd = new FormData();
      fd.append('title', document.getElementById('profTitle')?.value || '');
      fd.append('age', document.getElementById('profAge')?.value || '');
      fd.append('skills', document.getElementById('profSkills')?.value || '');
      fd.append('bio', document.getElementById('profBio')?.value || '');
      const photoFile = document.getElementById('profilePhotoInput')?.files?.[0];
      if (photoFile) fd.append('photo', photoFile);
      const updated = await api('PUT', '/api/profile', fd, true);
      S.myProfile = updated;
      S.user = { ...S.user, ...updated };
      localStorage.setItem('aq_user', JSON.stringify(S.user));
      S.success = 'Profiel opgeslagen! 🎉';
      S.loading = false; render();
    } catch(e) { S.error = e.message; S.loading = false; render(); }
  });

  // Foto preview bij selectie — meteen zichtbaar in de cirkel
  document.getElementById('profilePhotoInput')?.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const box = document.getElementById('profPhotoBox');
      if (!box) return;
      box.innerHTML = `<img id="profPhotoImg" src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
      // Update ook de nav-avatar alvast
      const navAvatar = document.querySelector('.nav-avatar');
      if (navAvatar) navAvatar.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    };
    reader.readAsDataURL(file);
  });
  document.querySelectorAll('.submission-row').forEach(row => row.addEventListener('click', () => {
    const sub = S.mySubmissions.find(s => s.id === row.dataset.sid);
    if (!sub) return;
    const form = S.myForms.find(f => f.id === sub.formId);
    const fields = form?.fields || [];
    const d = new Date(sub.submittedAt);
    const datum = d.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
    const tijd = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    let details = `<p class="text-sm text-muted" style="margin-bottom:16px">${datum} om ${tijd}</p>`;
    details += fields.filter(f => f.type !== 'photo' && f.type !== 'signature').map(f => {
      const val = sub.data[f.id];
      let display = '—';
      if (f.type === 'checkbox' && Array.isArray(val)) display = val.join(', ') || '—';
      else if (val !== undefined && val !== null && val !== '') display = String(val);
      return `<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px">${esc(f.label)}</div>
        <div style="font-size:14px;padding:6px 0;border-bottom:1px solid var(--border)">${esc(display)}</div>
      </div>`;
    }).join('');
    if (sub.photoCount > 0) details += `<div style="margin-top:8px"><span class="badge badge-blue">📷 ${sub.photoCount} foto('s) verzonden</span></div>`;
    if (sub.hasSignature) details += `<div style="margin-top:6px"><span class="badge badge-blue">✓ Handtekening meegestuurd</span></div>`;
    S.modal = { type: 'submissionDetail', title: sub.formName, content: details };
    render();
  }));
  document.querySelectorAll('.form-tile').forEach(t => t.addEventListener('click', async () => {
    const form = S.myForms.find(f => f.id === t.dataset.id);
    if (!form) return;
    S.fillingForm = form;
    S.currentFieldIdx = 0;
    // Herstel concept indien aanwezig
    const draft = loadDraft(form.id);
    S.formValues = draft?.values || {};
    S.currentFieldIdx = draft?.idx || 0;
    S.signatureData = null;
    S.photoFiles = [];
    S.error = null; S.success = null;
    // Preload list data
    const listFields = (form.fields||[]).filter(f => f.type === 'list' && f.listId);
    await Promise.all(listFields.map(async f => {
      if (!S.listItems[f.listId]) {
        try { const data = await api('GET', `/api/lists/${f.listId}/items`); S.listItems[f.listId] = data.items || []; }
        catch { S.listItems[f.listId] = []; }
      }
    }));
    render();
  }));
}

// --- FORM FILL ---
// ===== CONCEPT (DRAFT) OPSLAAN =====
function saveDraft(formId, values, idx) {
  try { localStorage.setItem('aq_draft_' + formId, JSON.stringify({ values, idx, savedAt: Date.now() })); } catch {}
}
function loadDraft(formId) {
  try { const d = localStorage.getItem('aq_draft_' + formId); return d ? JSON.parse(d) : null; } catch { return null; }
}
function clearDraft(formId) {
  try { localStorage.removeItem('aq_draft_' + formId); } catch {}
}

function fieldHasValue(f) {
  if (f.type === 'heading' || f.type === 'divider') return true;
  const val = S.formValues[f.id];
  if (f.type === 'photo') return S.photoFiles.length > 0;
  if (f.type === 'signature') return !!S.signatureData;
  if (f.type === 'checkbox') return Array.isArray(val) && val.length > 0;
  return val !== undefined && val !== null && val !== '';
}

// ── CONDITIONS RUNTIME HELPERS ─────────────────────────────────────────────
function conditionMatches(c) {
  const val = S.formValues[c.ifFieldId];
  const actual = (val === undefined || val === null) ? '' : String(val).toLowerCase();
  const cVal = (c.value || '').toLowerCase();
  switch (c.operator) {
    case 'equals':     return actual === cVal;
    case 'not_equals': return actual !== cVal;
    case 'contains':   return actual.includes(cVal);
    case 'not_empty':  return actual !== '';
    case 'empty':      return actual === '';
    default: return true;
  }
}

function fieldIsVisible(f, fields) {
  if (f.type === 'divider' || f.type === 'heading') return true;
  const form = S.fillingForm || S.builderState;
  const conditions = (form && form.conditions) || [];
  // show conditions: field is hidden by default, shown when condition matches
  const showConds = conditions.filter(c => c.thenFieldId === f.id && c.ifFieldId && (!c.action || c.action === 'show'));
  // hide conditions: field is visible by default, hidden when condition matches
  const hideConds = conditions.filter(c => c.thenFieldId === f.id && c.ifFieldId && c.action === 'hide');
  let visible = true;
  if (showConds.length > 0) {
    visible = showConds.some(c => conditionMatches(c));
  }
  if (hideConds.length > 0 && hideConds.some(c => conditionMatches(c))) {
    visible = false;
  }
  return visible;
}

function fieldIsRequired(f) {
  if (!f) return false;
  const form = S.fillingForm || S.builderState;
  const conditions = (form && form.conditions) || [];
  const requiredConds = conditions.filter(c => c.thenFieldId === f.id && c.ifFieldId && c.action === 'required');
  const optionalConds = conditions.filter(c => c.thenFieldId === f.id && c.ifFieldId && c.action === 'optional');
  // optional condition overrides required condition
  if (optionalConds.some(c => conditionMatches(c))) return false;
  if (requiredConds.some(c => conditionMatches(c))) return true;
  return f.required || false;
}

function getFieldWarning(f) {
  if (!f) return null;
  const form = S.fillingForm || S.builderState;
  const conditions = (form && form.conditions) || [];
  const warnCond = conditions.find(c => c.thenFieldId === f.id && c.ifFieldId && c.action === 'warning' && conditionMatches(c));
  return warnCond ? (warnCond.warningText || 'Let op dit veld.') : null;
}

function applySetValueConditions() {
  const form = S.fillingForm;
  if (!form) return false;
  const setValConds = (form.conditions || []).filter(c => c.action === 'set_value' && c.thenFieldId && c.ifFieldId);
  let changed = false;
  setValConds.forEach(c => {
    if (conditionMatches(c)) {
      const target = (form.fields || []).find(f => f.id === c.thenFieldId);
      if (target && !['photo', 'signature'].includes(target.type)) {
        const newVal = c.setValue || '';
        if (S.formValues[c.thenFieldId] !== newVal) {
          S.formValues[c.thenFieldId] = newVal;
          changed = true;
        }
      }
    }
  });
  return changed;
}

function getNextIdx(from, fields) {
  let i = from + 1;
  while (i < fields.length && !fieldIsVisible(fields[i], fields)) i++;
  return Math.min(i, fields.length - 1);
}

function getPrevIdx(from, fields) {
  let i = from - 1;
  while (i > 0 && !fieldIsVisible(fields[i], fields)) i--;
  return Math.max(i, 0);
}

function isLastVisible(idx, fields) {
  for (let i = idx + 1; i < fields.length; i++) {
    if (fieldIsVisible(fields[i], fields)) return false;
  }
  return true;
}

function renderFormFill() {
  const form = S.fillingForm;
  const fields = form.fields || [];

  // Classic mode: show all fields on one page
  if (form.mode === 'classic') return renderFormFillClassic();


  // Auto-advance if current field is invisible
  while (S.currentFieldIdx < fields.length && !fieldIsVisible(fields[S.currentFieldIdx], fields)) {
    S.currentFieldIdx++;
  }
  if (S.currentFieldIdx >= fields.length) S.currentFieldIdx = fields.length - 1;

  const idx = S.currentFieldIdx;
  const currentField = fields[idx];

  // Progress: visible non-heading fields only
  const visibleInputFields = fields.filter(f => f.type !== 'heading' && fieldIsVisible(f, fields));
  const visibleInputDone  = fields.slice(0, idx).filter(f => f.type !== 'heading' && fieldIsVisible(f, fields)).length;
  const pct = visibleInputFields.length === 0 ? 100 : Math.round((visibleInputDone / visibleInputFields.length) * 100);

  const isLast = isLastVisible(idx, fields);
  const currentHasValue = currentField ? fieldHasValue(currentField) : true;

  return `
  <div class="form-fill-header">
    <button class="back-btn" id="backFromFill">←</button>
    <div style="flex:1">
      <div class="form-fill-title">${esc(form.name)}</div>
      <div style="font-size:12px;opacity:0.8">Vraag ${visibleInputDone + (currentField?.type !== 'heading' ? 1 : 0)} van ${visibleInputFields.length}</div>
    </div>
    <div style="font-size:13px;font-weight:700;opacity:0.9">${pct}%</div>
  </div>

  <div style="height:5px;background:rgba(255,255,255,0.15);overflow:hidden">
    <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(255,255,255,0.6),rgba(255,255,255,0.95));border-radius:0 3px 3px 0;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 8px rgba(255,255,255,0.4)"></div>
  </div>

  <div class="form-fill-body">
    ${S.error ? `<div class="alert alert-error" style="animation:slideInUp 0.4s ease">⚠ ${S.error}</div>` : ''}

    ${idx > 0 ? `
    <div style="margin-bottom:20px;animation:fadeIn 0.4s ease">
      ${fields.slice(0, idx).filter(f => f.type !== 'heading' && fieldIsVisible(f, fields)).map((f, fi) => {
        const val = S.formValues[f.id];
        let display = '—';
        if (f.type === 'photo') display = S.photoFiles.length > 0 ? `📷 ${S.photoFiles.length} foto('s)` : '—';
        else if (f.type === 'signature') display = S.signatureData ? '✓ Handtekening' : '—';
        else if (f.type === 'checkbox' && Array.isArray(val)) display = val.join(', ') || '—';
        else if (val) display = String(val);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(31,157,97,0.06);border:1px solid rgba(31,157,97,0.12);margin-bottom:6px;font-size:13px;animation:slideInUp ${0.2 + fi*0.05}s ease">
          <span style="color:var(--text-muted)">${esc(f.label.split('\n')[0])}</span>
          <span style="font-weight:700;color:var(--success);display:flex;align-items:center;gap:5px"><span style="animation:checkBounce 0.4s ease">✓</span> ${esc(display)}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${currentField ? `
    <div class="field-step" style="${currentField.type === 'heading'
      ? ''
      : 'padding:20px;background:rgba(255,255,255,0.8);border-radius:20px;backdrop-filter:blur(8px);border:1px solid rgba(217,229,241,0.8);box-shadow:0 8px 32px rgba(15,39,68,0.07)'}">
      ${renderFormField(currentField)}
    </div>` : ''}

    <div style="height:120px"></div>
  </div>

  <div class="submit-wrap">
    ${!currentHasValue && fieldIsRequired(currentField) && !isLast ? `
    <div class="required-hint">⚠ Dit veld is verplicht — vul het in om verder te gaan.</div>` : ''}
    <div class="flex gap-2">
      ${idx > 0 ? `<button class="btn btn-ghost" id="prevFieldBtn" style="min-width:80px">← Terug</button>` : ''}
      ${!isLast ? `
        <button class="btn btn-primary btn-lg" id="nextFieldBtn" style="flex:1" ${!currentHasValue && fieldIsRequired(currentField) ? 'disabled' : ''}>
          Volgende →
        </button>` : `
        <button class="btn btn-primary btn-lg" id="submitFormBtn" style="flex:1" ${S.loading?'disabled':''}>
          ${S.loading ? '<span class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white"></span> Verzenden...' : '✉ Verzenden'}
        </button>`}
    </div>
  </div>`;
}

// ── CLASSIC MODE (all fields on one page) ──────────────────────────────────
function renderFormFillClassic() {
  const form = S.fillingForm;
  const fields = (form.fields || []).filter(f => fieldIsVisible(f, form.fields || []));
  return `
  <div class="form-fill-header">
    <button class="back-btn" id="backFromFill">←</button>
    <div style="flex:1">
      <div class="form-fill-title">${esc(form.name)}</div>
    </div>
  </div>

  <div class="form-fill-body" style="max-width:640px">
    ${S.error   ? `<div class="alert alert-error"   style="animation:slideInUp 0.4s ease">⚠ ${S.error}</div>`   : ''}
    ${S.success ? `<div class="alert alert-success" style="animation:slideInUp 0.4s ease">✓ ${S.success}</div>` : ''}

    ${fields.map((f, fi) => {
      if (f.type === 'heading') {
        const lines = (f.label || '').split('\n');

        }).join('');
        const bodyHtml = body ? renderBody(body) : '';
        const hasList  = bodyHtml.includes('<li');
        return `
        <div style="background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid rgba(0,87,184,0.18);border-radius:16px;padding:16px 20px;margin-bottom:18px;margin-top:${fi>0?'28px':'0'};animation:fadeIn 0.4s ease">
          <div style="font-size:15px;font-weight:900;color:#1d4ed8;margin-bottom:${body?'8px':'0'}">${esc(title)}</div>
          ${body ? `<div style="font-size:13px;color:#374151;line-height:1.7">${hasList?`<ul style="list-style:disc;padding-left:4px">${bodyHtml}</ul>`:bodyHtml}</div>` : ''}
        </div>`;
      }
      return `<div class="card" style="margin-bottom:14px;animation:fadeIn 0.4s ${fi*0.04}s ease both">

    }).join('')}

    <div style="height:90px"></div>
  </div>

  <div class="submit-wrap">
    <button class="btn btn-primary btn-lg" id="submitFormBtn" ${S.loading?'disabled':''}>
      ${S.loading ? '<span class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white"></span> Verzenden...' : '✉ Formulier verzenden'}
    </button>
  </div>`;
}

function renderFormField(f) {
  const val = S.formValues[f.id];
  const isReq = fieldIsRequired(f);
  const reqMark = isReq ? ' <span style="color:var(--danger)">*</span>' : '';
  const warning = getFieldWarning(f);
  const warningHtml = warning ? `<div style="margin-top:8px;padding:9px 12px;background:#FEF3C7;border:1px solid #F0C040;border-radius:8px;font-size:13px;color:#92400E;display:flex;align-items:flex-start;gap:7px;line-height:1.4"><span style="flex-shrink:0">⚠️</span><span>${esc(warning)}</span></div>` : '';

  const wrap = (html) => warningHtml ? html + warningHtml : html;

  if (f.type === 'divider') {
    return `<hr style="border:none;border-top:2px solid var(--border);margin:8px 0;border-radius:2px">`;
  }

  if (f.type === 'heading') {
    const lines = (f.label || '').split('\n');
    const title = lines[0];
    const body = lines.slice(1).join('\n').trim();
    // Render body: lines starting with • become list items
    const renderBody = (text) => {
      if (!text) return '';
      return text.split('\n').map(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('•') || trimmed.startsWith('-')) {
          return `<li style="margin-left:16px;margin-bottom:2px">${esc(trimmed.replace(/^[•\-]\s*/,''))}</li>`;
        }
        return trimmed ? `<p style="margin-bottom:4px">${esc(trimmed)}</p>` : '';
      }).join('');
    };
    const bodyHtml = renderBody(body);
    const hasList = bodyHtml.includes('<li');
    return `<div style="background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid rgba(0,87,184,0.18);border-radius:16px;padding:18px 20px;text-align:left">
      <div style="font-size:16px;font-weight:900;color:#1d4ed8;margin-bottom:${body?'10px':'0'};letter-spacing:-0.2px">${esc(title)}</div>
      ${body ? `<div style="font-size:14px;color:#374151;line-height:1.7">${hasList ? `<ul style="list-style:disc;padding-left:4px">${bodyHtml}</ul>` : bodyHtml}</div>` : ''}
    </div>`;
  }

  if (f.type === 'text' || f.type === 'email' || f.type === 'phone' || f.type === 'number') {
    const inputType = f.type === 'phone' ? 'tel' : f.type;
    return wrap(`<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <input class="form-control fill-input" data-id="${f.id}" type="${inputType}" value="${esc(val||'')}" placeholder="${esc(f.label)}"></div>`);
  }
  if (f.type === 'textarea') {
    return wrap(`<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <textarea class="form-control fill-input" data-id="${f.id}" placeholder="${esc(f.label)}">${esc(val||'')}</textarea></div>`);
  }
  if (f.type === 'date') {
    return wrap(`<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <input class="form-control fill-input" data-id="${f.id}" type="date" value="${esc(val||'')}"></div>`);
  }
  if (f.type === 'multiselect') {
    const opts = f.options || [];
    return wrap(`<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <div class="check-group">
        ${opts.map(o => `<div class="check-item"><input type="radio" id="r_${f.id}_${esc(o)}" name="r_${f.id}" class="fill-radio" data-id="${f.id}" value="${esc(o)}" ${val===o?'checked':''}><label for="r_${f.id}_${esc(o)}">${esc(o)}</label></div>`).join('')}
      </div></div>`);
  }
  if (f.type === 'checkbox') {
    const opts = f.options || [];
    const checked = Array.isArray(val) ? val : [];
    return wrap(`<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <div class="check-group">
        ${opts.map(o => `<div class="check-item"><input type="checkbox" id="c_${f.id}_${esc(o)}" class="fill-checkbox" data-id="${f.id}" value="${esc(o)}" ${checked.includes(o)?'checked':''}><label for="c_${f.id}_${esc(o)}">${esc(o)}</label></div>`).join('')}
      </div></div>`);
  }
  if (f.type === 'list') {
    const items = S.listItems[f.listId] || [];
    return wrap(`<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <div class="dropdown-wrap" id="ddwrap_${f.id}">
        <input class="form-control dd-search" data-id="${f.id}" type="text" placeholder="Zoeken of selecteren..." value="${esc(val||'')}" autocomplete="off" readonly>
        <div class="dropdown-list hidden" id="ddlist_${f.id}">
          ${items.map(item => `<div class="dropdown-item ${val===item?'selected':''}" data-id="${f.id}" data-val="${esc(item)}">${esc(item)}</div>`).join('')}
        </div>
      </div></div>`);
  }
  if (f.type === 'signature') {
    const hasSig = !!S.signatureData;
    return wrap(`<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <div class="sig-wrap">
        <canvas class="sig-canvas" id="sig_${f.id}" data-id="${f.id}" width="600" height="160"></canvas>
        <div class="sig-actions">
          <button class="btn btn-ghost btn-sm sig-clear-btn" data-id="${f.id}">✕ Wissen</button>
          ${hasSig ? '<span class="text-sm" style="color:var(--success)">✓ Handtekening gezet</span>' : '<span class="text-sm text-muted">Teken hier je handtekening</span>'}
        </div>
      </div></div>`);
  }
  if (f.type === 'photo') {
    return wrap(`<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <input type="file" accept="image/*" capture="environment" multiple id="photo_${f.id}" data-id="${f.id}" class="fill-photo hidden">
      <button class="btn btn-outline" onclick="document.getElementById('photo_${f.id}').click()">📷 Foto('s) toevoegen</button>
      <div class="photo-grid" id="photoGrid_${f.id}">
        ${S.photoFiles.map((pf,i) => `
          <div class="photo-thumb">
            <img src="${URL.createObjectURL(pf)}" alt="foto">
            <button class="photo-remove" data-pi="${i}">×</button>
          </div>`).join('')}
      </div>
    </div>`);
  }
  return '';
}

function bindMonteur2() {
  bindDarkToggle();
  document.getElementById('backFromFill')?.addEventListener('click', () => {
    S.fillingForm = null; S.currentFieldIdx = 0; S.error = null; S.success = null; render();
  });

  // Navigatie: volgende veld
  document.getElementById('nextFieldBtn')?.addEventListener('click', () => {
    const fields = S.fillingForm.fields || [];
    const current = fields[S.currentFieldIdx];
    if (fieldIsRequired(current) && !fieldHasValue(current)) {
      S.error = `Veld "${current.label.split('\n')[0]}" is verplicht.`; render(); return;
    }
    S.error = null;
    applySetValueConditions();
    S.currentFieldIdx = getNextIdx(S.currentFieldIdx, fields);
    render();
  });

  // Navigatie: vorig veld
  document.getElementById('prevFieldBtn')?.addEventListener('click', () => {
    S.error = null;
    S.currentFieldIdx = getPrevIdx(S.currentFieldIdx, S.fillingForm.fields || []);
    render();
  });

  // Automatisch doorschakelen bij invullen (radio/list)
  const autoNext = () => {
    const fields = S.fillingForm.fields || [];
    const current = fields[S.currentFieldIdx];
    if (current && fieldHasValue(current) && !isLastVisible(S.currentFieldIdx, fields)) {
      setTimeout(() => { S.currentFieldIdx = getNextIdx(S.currentFieldIdx, fields); render(); }, 300);
    }
  };

  // Auto-save draft helper
  const autosave = () => {
    if (S.fillingForm) saveDraft(S.fillingForm.id, S.formValues, S.currentFieldIdx);
  };

  // Text/date/email/etc
  document.querySelectorAll('.fill-input').forEach(el => el.addEventListener('input', e => {
    S.formValues[e.target.dataset.id] = e.target.value;
    autosave();
    // Update next button state without full re-render
    applySetValueConditions();
    const nextBtn = document.getElementById('nextFieldBtn');
    if (nextBtn) {
      const fields = S.fillingForm.fields || [];
      const current = fields[S.currentFieldIdx];
      nextBtn.disabled = fieldIsRequired(current) && !fieldHasValue(current);
    }
  }));
  // Radio
  document.querySelectorAll('.fill-radio').forEach(el => el.addEventListener('change', e => {
    if (e.target.checked) { S.formValues[e.target.dataset.id] = e.target.value; autosave(); applySetValueConditions(); autoNext(); }
  }));
  // Checkbox
  document.querySelectorAll('.fill-checkbox').forEach(el => el.addEventListener('change', () => {
    const id = el.dataset.id;
    const checked = Array.from(document.querySelectorAll(`.fill-checkbox[data-id="${id}"]:checked`)).map(c => c.value);
    S.formValues[id] = checked;
    autosave(); applySetValueConditions();
  }));

  // Dropdown lists
  document.querySelectorAll('.dd-search').forEach(inp => {
    const id = inp.dataset.id;
    const list = document.getElementById(`ddlist_${id}`);

    inp.addEventListener('click', () => {
      inp.readOnly = false;
      list?.classList.remove('hidden');
    });
    inp.addEventListener('input', () => {
      const q = inp.value.toLowerCase();
      list?.querySelectorAll('.dropdown-item').forEach(item => {
        item.style.display = item.dataset.val.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
  document.querySelectorAll('.dropdown-item').forEach(item => item.addEventListener('click', e => {
    const id = item.dataset.id;
    const val = item.dataset.val;
    S.formValues[id] = val;
    const inp = document.querySelector(`.dd-search[data-id="${id}"]`);
    if (inp) { inp.value = val; inp.readOnly = true; }
    document.getElementById(`ddlist_${id}`)?.classList.add('hidden');
    document.querySelectorAll(`#ddlist_${id} .dropdown-item`).forEach(i => i.classList.toggle('selected', i.dataset.val === val));
  }));
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('dd-search') && !e.target.classList.contains('dropdown-item')) {
      document.querySelectorAll('.dropdown-list').forEach(l => l.classList.add('hidden'));
    }
  });

  // Signature pads
  document.querySelectorAll('.sig-canvas').forEach(canvas => {
    setupSignaturePad(canvas);
  });
  document.querySelectorAll('.sig-clear-btn').forEach(btn => btn.addEventListener('click', () => {
    S.signatureData = null;
    const canvas = document.getElementById(`sig_${btn.dataset.id}`);
    if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
    render();
  }));

  // Photo upload
  document.querySelectorAll('.fill-photo').forEach(inp => inp.addEventListener('change', () => {
    for (const file of inp.files) S.photoFiles.push(file);
    render();
  }));
  document.querySelectorAll('.photo-remove').forEach(btn => btn.addEventListener('click', () => {
    S.photoFiles.splice(parseInt(btn.dataset.pi), 1); render();
  }));

  // Submit
  document.getElementById('submitFormBtn')?.addEventListener('click', submitForm);

  // Keyboard navigatie: pijltjestoetsen
  document.addEventListener('keydown', _formKeyHandler);

  // Touch swipe navigatie (links/rechts)
  setupFormSwipe();
}

function _formKeyHandler(e) {
  if (!S.fillingForm || S.view !== 'monteur') { document.removeEventListener('keydown', _formKeyHandler); return; }
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') document.getElementById('nextFieldBtn')?.click();
  if (e.key === 'ArrowLeft') document.getElementById('prevFieldBtn')?.click();
}

function setupFormSwipe() {
  const body = document.querySelector('.form-fill-body');
  if (!body) return;
  let startX = 0, startY = 0;
  body.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  body.addEventListener('touchend', e => {
    if (!S.fillingForm) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return; // geen echte horizontale swipe
    if (dx < -50) { // swipe links = volgende
      document.getElementById('nextFieldBtn')?.click();
    } else if (dx > 50) { // swipe rechts = vorige
      document.getElementById('prevFieldBtn')?.click();
    }
  }, { passive: true });
}

function setupSignaturePad(canvas) {
  const ctx = canvas.getContext('2d');
  // Resize canvas to actual display size
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width || 600;
  canvas.height = 160;

  ctx.strokeStyle = '#1C2833';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false, lastX = 0, lastY = 0;

  const getPos = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };

  const start = e => { e.preventDefault(); drawing = true; const p = getPos(e, canvas); lastX = p.x; lastY = p.y; ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = e => {
    if (!drawing) return; e.preventDefault();
    const p = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  const stop = e => {
    if (!drawing) return; e.preventDefault(); drawing = false;
    S.signatureData = canvas.toDataURL('image/png');
  };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}

async function submitForm() {
  const form = S.fillingForm;
  S.error = null;

  // Validate required fields (skip hidden fields)
  for (const field of (form.fields||[])) {
    if (!fieldIsRequired(field)) continue;
    if (!fieldIsVisible(field, form.fields||[])) continue;
    if (field.type === 'photo') {
      if (S.photoFiles.length === 0) { S.error = `Veld "${field.label.split('\n')[0]}" is verplicht — voeg minstens één foto toe.`; render(); return; }
      continue;
    }
    const val = field.type === 'signature' ? S.signatureData : S.formValues[field.id];
    const empty = val === undefined || val === null || val === '' || (Array.isArray(val) && val.length === 0);
    if (empty) { S.error = `Veld "${field.label.split('\n')[0]}" is verplicht.`; render(); return; }
  }

  S.loading = true; render();

  try {
    const fd = new FormData();
    fd.append('data', JSON.stringify(S.formValues));
    if (S.signatureData) fd.append('signature', S.signatureData);
    S.photoFiles.forEach((f, i) => fd.append('photos', f, f.name || `foto_${i}.jpg`));

    const result = await api('POST', `/api/submit/${form.id}`, fd, true);
    clearDraft(form.id);
    S.loading = false;
    // Voeg de nieuwe inzending direct toe aan de lokale lijst zodat history meteen klopt
    if (result && result.id) {
      S.mySubmissions = [result, ...(S.mySubmissions || [])];
    }
    S.view = 'submitted';
    S.lastSubmission = { formName: form.name, values: { ...S.formValues }, fields: form.fields || [] };
    S.fillingForm = null;
    S.formValues = {}; S.signatureData = null; S.photoFiles = [];
    render();
  } catch(e) { S.error = e.message; S.loading = false; render(); }
}

// BEVESTIGINGSSCHERM
// ===================================================
function renderSubmittedScreen() {
  const sub = S.lastSubmission || {};
  const fields = (sub.fields || []).filter(f => !['photo','signature','heading','divider'].includes(f.type));
  const now = new Date();
  const datum = now.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const tijd = now.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  return `
  <canvas id="confetti-canvas"></canvas>
  ${renderTopNav()}
  <div class="page-content" style="max-width:580px;margin:0 auto;padding-top:24px">
    <div class="submitted-hero" style="animation:popIn 0.7s var(--ease-spring) both">
      <div class="submitted-check">✅</div>
      <h2 class="submitted-title">Formulier verzonden!</h2>
      <p class="submitted-sub">${esc(sub.formName || '')} · ${datum} om ${tijd}</p>
    </div>

    ${fields.length > 0 ? `
    <div class="card" style="margin-bottom:20px;animation:slideInUp 0.5s var(--ease-out) 0.3s both">
      <p class="card-title" style="margin-bottom:16px;display:flex;align-items:center;gap:8px">
        <span style="background:var(--blue-light);color:var(--blue);border-radius:999px;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:13px">📋</span>
        Samenvatting
      </p>
      ${fields.map(f => {
        const val = sub.values?.[f.id];
        let display = '—';
        if (Array.isArray(val)) display = val.join(', ') || '—';
        else if (val !== undefined && val !== null && val !== '') display = String(val);
        return `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:3px">${esc(f.label?.split('\n')[0] || '')}</div>
          <div style="font-size:14px;color:var(--text)">${esc(display)}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div style="display:flex;gap:12px;animation:slideInUp 0.5s var(--ease-out) 0.4s both">
      <button class="btn btn-primary btn-lg" id="backToFormsBtn" style="flex:1;font-size:15px">
        ← Terug naar formulieren
      </button>
    </div>
  </div>`;
}

function bindSubmittedScreen() {
  document.getElementById('logoutBtn')?.addEventListener('click', logout);
  bindDarkToggle();
  document.getElementById('backToFormsBtn')?.addEventListener('click', () => {
    S.view = 'monteur'; S.monteurTab = 'forms'; S.lastSubmission = null; render();
  });
  // Fire confetti!
  requestAnimationFrame(() => launchConfetti());
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const colors = ['#0057B8','#7C3AED','#10B981','#F59E0B','#F43F5E','#06B6D4','#EC4899','#FBBF24'];
  const shapes = ['circle','rect','triangle'];

  for (let i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height * 0.5 - 20,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      size: Math.random() * 10 + 4,
      rotation: Math.random() * 360,
      rotVel: (Math.random() - 0.5) * 8,
      opacity: 1
    });
  }

  let frame = 0;
  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      p.vx *= 0.995;
      p.rotation += p.rotVel;
      if (p.y > canvas.height * 0.7) p.opacity -= 0.02;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'rect') {
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -p.size/2);
        ctx.lineTo(p.size/2, p.size/2);
        ctx.lineTo(-p.size/2, p.size/2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    });

    frame++;
    if (frame < 180 && particles.some(p => p.opacity > 0)) {
      requestAnimationFrame(drawFrame);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  drawFrame();
}

// ===================================================
// SHARED COMPONENTS
// ===================================================
function renderTopNav() {
  const photoUrl = S.myProfile?.photoUrl || S.user?.photoUrl || '';
  const initials = (S.user?.name || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  return `
  <nav class="topnav">
    <div class="logo logo-white"><span class="crown">♛</span>aqua+</div>
    <div class="flex items-center gap-1">
      <button class="dark-toggle" id="darkToggleBtn" title="Donkere modus">${isDark ? '☀️' : '🌙'}</button>
      <span class="nav-user" style="display:flex;align-items:center;gap:8px">
        <div class="nav-avatar">${photoUrl ? `<img src="${photoUrl}">` : initials}</div>
        <span style="font-size:13px;font-weight:600">${esc(S.user?.name || '')}</span>
      </span>
      <button class="nav-logout" id="logoutBtn">Uitloggen</button>
    </div>
  </nav>`;
}

// ===================================================
// BIND ROUTING
// ===================================================
function bindAfterRender() {
  if (S.view === 'admin') {
    if (S.editingForm !== null) bindFormBuilder();
    else bindAdmin();
  }
  if (S.view === 'monteur') {
    if (S.fillingForm) bindMonteur2();
    else bindMonteur();
  }
}

// ===================================================
// LOGOUT
// ===================================================
function logout() {
  localStorage.removeItem('aq_token'); localStorage.removeItem('aq_user');
  S = { ...S, token: null, user: null, view: 'login', error: null, success: null, fillingForm: null, editingForm: null, modal: null };
  render();
}

// ===================================================
// UTILS
// ===================================================
function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// render is already fully self-contained (render + bind per view)
window.render = render;

// ===================================================
// INIT
// ===================================================
async function init() {
  // Apply saved theme
  const savedTheme = localStorage.getItem('aq_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);

  S.view = 'loading'; render();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW fout:', e));
  }

  // Wachtwoord reset link detecteren (?reset=TOKEN in URL)
  const urlParams = new URLSearchParams(window.location.search);
  const resetToken = urlParams.get('reset');
  if (resetToken) {
    S.resetToken = resetToken;
    S.view = 'reset';
    render();
    return;
  }

  if (S.token && S.user) {
    try {
      await api('GET', '/api/me');
      await initAfterLogin();
    } catch {
      logout();
    }
  } else {
    S.view = 'login'; render();
  }
}

init();
</script>
