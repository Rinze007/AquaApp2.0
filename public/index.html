<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0057B8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AquaApp">
  <link rel="manifest" href="/manifest.json">
  <title>AquaApp</title>
  <style>
:root {
  --blue: #0057B8;
  --blue-dark: #003E87;
  --blue-ink: #0F2744;
  --blue-light: #EAF3FF;
  --blue-soft: #F4F8FD;
  --grey: #94A3B8;
  --grey-light: #F6F9FC;
  --surface: rgba(255,255,255,0.94);
  --surface-solid: #FFFFFF;
  --surface-alt: #F8FBFE;
  --border: #D9E5F1;
  --border-strong: #C7D8E8;
  --text: #1E293B;
  --text-muted: #64748B;
  --white: #FFFFFF;
  --success: #1F9D61;
  --danger: #D64545;
  --warning: #D98A00;
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --shadow-xs: 0 2px 8px rgba(15,39,68,0.04);
  --shadow: 0 10px 30px rgba(15,39,68,0.08);
  --shadow-lg: 0 22px 50px rgba(15,39,68,0.14);
  --shadow-focus: 0 0 0 4px rgba(0,87,184,0.12);
  --gradient-brand: linear-gradient(135deg, #0B2540 0%, #004FAD 52%, #0A79E8 100%);
  --gradient-brand-soft: linear-gradient(135deg, #EAF3FF 0%, #F7FAFE 100%);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 25%),
    linear-gradient(180deg, #F5F9FD 0%, #ECF3F9 100%);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.45;
}

#app { min-height: 100vh; }

a { color: inherit; }
button, input, select, textarea { font: inherit; }

/* ===== UTILITIES ===== */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 8px; }
.gap-2 { gap: 16px; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.w-full { width: 100%; }
.text-sm { font-size: 13px; }
.text-muted { color: var(--text-muted); }
.bold { font-weight: 600; }

/* ===== LOADER ===== */
.loader-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid rgba(0,87,184,0.12);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes slideInRight { from { opacity:0; transform:translateX(40px) scale(0.96); } to { opacity:1; transform:translateX(0) scale(1); } }
@keyframes slideInUp { from { opacity:0; transform:translateY(30px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes float { 0%,100% { transform:translateY(0px) rotateX(0deg); } 50% { transform:translateY(-6px) rotateX(1deg); } }
@keyframes shimmer { 0% { background-position:200% center; } 100% { background-position:-200% center; } }
@keyframes progressFill { from { width:0%; } }
@keyframes glowPulse { 0%,100% { box-shadow:0 0 20px rgba(0,87,184,0.3); } 50% { box-shadow:0 0 40px rgba(0,87,184,0.6); } }
@keyframes checkBounce { 0% { transform:scale(0); } 60% { transform:scale(1.3); } 100% { transform:scale(1); } }

/* ===== LOGO ===== */
.logo {
  font-size: 28px;
  font-weight: 900;
  color: var(--blue);
  letter-spacing: -1.2px;
  position: relative;
  display: inline-block;
  text-transform: lowercase;
}
.logo .crown {
  font-size: 12px;
  color: rgba(15,39,68,0.45);
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%);
}
.logo-white { color: var(--white); }
.logo-white .crown { color: rgba(255,255,255,0.72); }

/* ===== LOGIN ===== */
.login-wrap {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  perspective: 1200px;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(10,121,232,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(0,62,135,0.28) 0%, transparent 50%),
    radial-gradient(circle at top left, rgba(255,255,255,0.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 22%),
    var(--gradient-brand);
  overflow: hidden;
}
.login-wrap::before {
  content: '';
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle at 25% 40%, rgba(255,255,255,0.04) 0%, transparent 35%),
    radial-gradient(circle at 75% 60%, rgba(0,87,184,0.15) 0%, transparent 35%);
  pointer-events: none;
  animation: bgFloat 8s ease-in-out infinite alternate;
}
@keyframes bgFloat {
  from { transform: translateX(-15px) translateY(-10px); }
  to   { transform: translateX(15px) translateY(10px); }
}
.login-card {
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px) saturate(180%);
  border-radius: 28px;
  padding: 42px 34px 34px;
  width: 100%;
  max-width: 420px;
  box-shadow:
    0 32px 80px rgba(15,39,68,0.28),
    0 8px 20px rgba(0,87,184,0.14),
    inset 0 1px 0 rgba(255,255,255,0.9);
  border: 1px solid rgba(255,255,255,0.6);
  transform-style: preserve-3d;
  transition: transform 0.12s var(--ease-out), box-shadow 0.3s var(--ease-smooth);
  animation: cardAppear 0.9s var(--ease-spring) both;
  will-change: transform;
}
@keyframes cardAppear {
  from {
    opacity: 0;
    transform: translateY(60px) rotateX(12deg) scale(0.92);
  }
  to {
    opacity: 1;
    transform: translateY(0) rotateX(0deg) scale(1);
  }
}
.login-card .logo {
  animation: logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat {
  0%,100% { transform: translateY(0px); filter: drop-shadow(0 4px 12px rgba(0,87,184,0.25)); }
  50%      { transform: translateY(-5px); filter: drop-shadow(0 10px 20px rgba(0,87,184,0.35)); }
}
.login-logo { text-align: center; margin-bottom: 30px; }
.login-logo .logo { font-size: 42px; }
.login-logo .logo .crown { font-size: 16px; top: -14px; }
.login-subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 10px;
  line-height: 1.55;
}

/* ===== FORM ELEMENTS ===== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 7px;
}
.form-control {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-size: 15px;
  color: var(--text);
  background: var(--surface-solid);
  transition: border-color 0.22s var(--ease-smooth), box-shadow 0.22s var(--ease-smooth), transform 0.18s var(--ease-spring);
  outline: none;
}
.form-control:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.form-control:focus {
  border-color: var(--blue);
  box-shadow: var(--shadow-focus), 0 4px 16px rgba(0,87,184,0.08);
  transform: translateY(-1px);
}
.form-control::placeholder { color: #97A6B8; }
textarea.form-control {
  resize: vertical;
  min-height: 96px;
}
select.form-control { cursor: pointer; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  transition: transform 0.2s var(--ease-spring), box-shadow 0.2s var(--ease-smooth), background 0.2s ease, filter 0.2s ease;
  text-decoration: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
  border-radius: inherit;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }
.btn:hover { transform: translateY(-2px) scale(1.015); }
.btn:active { transform: translateY(1px) scale(0.975); transition-duration: 0.07s; }
.btn-primary {
  background: linear-gradient(145deg, #0A79E8, var(--blue), var(--blue-dark));
  background-size: 200% 200%;
  color: var(--white);
  box-shadow: 0 8px 24px rgba(0,87,184,0.28), 0 2px 6px rgba(0,87,184,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-primary:hover {
  background-position: right center;
  box-shadow: 0 14px 36px rgba(0,87,184,0.38), 0 4px 12px rgba(0,87,184,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
  filter: brightness(1.06);
}
.btn-outline {
  background: var(--white);
  color: var(--blue);
  border: 1.5px solid var(--border);
}
.btn-outline:hover {
  background: var(--blue-light);
  border-color: #BFD4EB;
}
.btn-danger {
  background: linear-gradient(135deg, #E05555, #C73E3E);
  color: var(--white);
}
.btn-danger:hover { box-shadow: 0 10px 22px rgba(214,69,69,0.22); }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-alt); }
.btn-success {
  background: linear-gradient(135deg, #1F9D61, #2DBE77);
  color: var(--white);
}
.btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 12px; }
.btn-lg { padding: 14px 20px; font-size: 16px; width: 100%; border-radius: 16px; letter-spacing: 0.01em; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

/* Login card button shimmer */
.login-card .btn-primary {
  background: linear-gradient(145deg, #0057B8, #0A79E8, #003E87, #0057B8);
  background-size: 300% 100%;
  animation: btnShimmer 4s ease-in-out infinite;
  box-shadow: 0 10px 32px rgba(0,87,184,0.38), 0 3px 8px rgba(0,87,184,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
}
@keyframes btnShimmer {
  0%   { background-position: 0% center; }
  50%  { background-position: 100% center; }
  100% { background-position: 0% center; }
}
.login-card .btn-primary:hover {
  animation: none;
  background-position: right center;
  filter: brightness(1.1);
  box-shadow: 0 16px 44px rgba(0,87,184,0.46), 0 4px 12px rgba(0,87,184,0.26), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* ===== ALERTS ===== */
.alert {
  padding: 14px 16px;
  border-radius: 16px;
  font-size: 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  border: 1px solid transparent;
  box-shadow: var(--shadow-xs);
}
.alert-error { background: #FEF2F2; color: #B42318; border-color: #F9C8C8; }
.alert-success { background: #EEF9F3; color: #16794B; border-color: #B9E4CA; }
.alert-info { background: #EFF6FF; color: #1D4E89; border-color: #C7DCF6; }

/* ===== NAV ===== */
.topnav {
  background: linear-gradient(90deg, #0B1D35 0%, #0D3070 40%, #0057B8 100%);
  color: var(--white);
  padding: 0 24px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(15,39,68,0.24), 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(12px) saturate(160%);
  animation: navSlideDown 0.6s var(--ease-out) both;
}
@keyframes navSlideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.topnav .logo { font-size: 24px; color: var(--white); }
.topnav .logo .crown { color: rgba(255,255,255,0.72); font-size: 11px; top: -9px; }
.nav-user {
  font-size: 13px;
  opacity: 0.96;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
}
.nav-logout {
  background: rgba(255,255,255,0.14);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.nav-logout:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

/* ===== TABS ===== */
.tabs {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(217,229,241,0.95);
  padding: 0 24px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  position: sticky;
  top: 70px;
  z-index: 90;
}
.tab {
  padding: 16px 18px 14px;
  font-size: 14px;
  font-weight: 800;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color 0.2s var(--ease-smooth), border-color 0.2s var(--ease-smooth), background 0.2s ease, transform 0.18s var(--ease-spring);
  user-select: none;
  border-radius: 12px 12px 0 0;
  position: relative;
}
.tab:hover { color: var(--blue); background: rgba(234,243,255,0.72); transform: translateY(-1px); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 20%;
  right: 20%;
  height: 3px;
  background: var(--blue);
  border-radius: 3px 3px 0 0;
  animation: tabUnderline 0.3s var(--ease-spring) both;
}
@keyframes tabUnderline {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 1; }
}

/* ===== CONTENT ===== */
.page-content {
  padding: 32px 24px 28px;
  max-width: 1180px;
  margin: 0 auto;
}

/* ===== CARDS ===== */
.card {
  background: var(--surface);
  backdrop-filter: blur(10px) saturate(140%);
  border-radius: 20px;
  box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
  padding: 24px;
  margin-bottom: 18px;
  border: 1px solid rgba(217,229,241,0.95);
  transition: transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease-smooth);
  animation: fadeIn 0.5s var(--ease-out) both;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg), 0 1px 0 rgba(255,255,255,0.8) inset;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.card-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}
.card-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== TABLE ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: 18px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: #F6FAFE;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 14px;
  border-bottom: 1px solid rgba(217,229,241,0.92);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(248,251,254,0.95); }
.badge {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-blue { background: #EAF3FF; color: var(--blue); }
.badge-grey { background: #F1F5F9; color: var(--text-muted); }

/* ===== FORM BUILDER ===== */
.field-card {
  background: linear-gradient(180deg, #F9FBFE 0%, #F4F8FC 100%);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
}
.field-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}
.field-number {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #2A7DE1);
  color: white;
  font-size: 12px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.field-row { display: flex; gap: 12px; flex-wrap: wrap; }
.field-row .form-group { flex: 1; min-width: 150px; margin-bottom: 8px; }
.options-list { margin-top: 8px; }
.option-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.option-row .form-control { flex: 1; padding: 9px 12px; font-size: 13px; }
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #D4DCE6;
  border-radius: 999px;
  transition: 0.3s;
}
.toggle-slider:before {
  position: absolute;
  content: '';
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
}
.toggle input:checked + .toggle-slider { background: var(--blue); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* ===== MONTEUR FORM TILES ===== */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 18px;
  perspective: 900px;
}
.form-tile {
  background: linear-gradient(160deg, rgba(255,255,255,0.99) 0%, rgba(240,248,255,0.97) 100%);
  border-radius: 20px;
  padding: 24px 18px;
  cursor: pointer;
  box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.9) inset;
  border: 1px solid rgba(217,229,241,0.95);
  transition: transform 0.28s var(--ease-spring), box-shadow 0.28s var(--ease-smooth), border-color 0.22s ease;
  text-align: center;
  transform-style: preserve-3d;
  will-change: transform;
  position: relative;
  overflow: hidden;
}
.form-tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.3) 0%, transparent 60%);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.28s;
  pointer-events: none;
}
.form-tile:hover::before { opacity: 1; }
.form-tile:hover {
  border-color: rgba(0,87,184,0.2);
  box-shadow: 0 24px 56px rgba(15,39,68,0.16), 0 8px 20px rgba(0,87,184,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
  transform: translateY(-6px) rotateX(3deg) scale(1.02);
}
.form-tile:active {
  transform: translateY(-1px) scale(0.98);
  transition-duration: 0.08s;
}
.form-tile-icon {
  width: 60px;
  height: 60px;
  border-radius: 18px;
  background: linear-gradient(145deg, #EAF3FF, #D4E8FF);
  color: var(--blue);
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 6px 16px rgba(0,87,184,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
  transition: transform 0.28s var(--ease-spring);
}
.form-tile:hover .form-tile-icon {
  transform: translateY(-4px) scale(1.08);
}
.form-tile-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}
.form-tile-fields { font-size: 12px; color: var(--text-muted); }

/* ===== FORM FILL ===== */
.form-fill-header {
  background: linear-gradient(90deg, #0B1D35 0%, #0D3070 40%, #0057B8 100%);
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;

<body>
<div id="app"></div>
<script>
// ===================================================
// STATE
// ===================================================
let S = {
  token: localStorage.getItem('aq_token'),
  user: JSON.parse(localStorage.getItem('aq_user') || 'null'),
  view: 'loading',
  adminTab: 'forms',
  // Admin data
  forms: [], users: [], lists: [],
  // Form builder
  editingForm: null,
  builderState: null,
  // Monteur
  myForms: [],
  mySubmissions: [],
  monteurTab: 'forms',
  fillingForm: null,
  currentFieldIdx: 0,
  formValues: {},
  signatureData: null,
  photoFiles: [],
  // UI
  loading: false, error: null, success: null,
  modal: null,
  dropdownOpen: null,
  listItems: {}
};

// ===================================================
// API
// ===================================================
async function api(method, url, data = null, isForm = false) {
  const headers = {};
  if (S.token) headers['Authorization'] = `Bearer ${S.token}`;
  if (!isForm && data) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, {
    method,
    headers,
    body: isForm ? data : (data ? JSON.stringify(data) : null)
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Er is een fout opgetreden');
  return json;
}

// ===================================================
// RENDER DISPATCHER
// ===================================================
function render() {
  const app = document.getElementById('app');
  if (S.view === 'loading') { app.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p style="color:var(--blue);font-weight:600">Laden...</p></div>`; return; }
  if (S.view === 'login') { app.innerHTML = renderLogin(); bindLogin(); return; }
  if (S.view === 'admin') { app.innerHTML = renderAdmin(); bindAdmin(); return; }
  if (S.view === 'monteur') { app.innerHTML = renderMonteur(); bindMonteur(); return; }
}

// ===================================================
// LOGIN
// ===================================================
function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo">
          <span class="crown">♛</span>
          aqua+
        </div>
        <p class="login-subtitle">Inloggen voor monteurs & beheerders</p>
      </div>
      ${S.error ? `<div class="alert alert-error">⚠ ${S.error}</div>` : ''}
      <div class="form-group">
        <label>Gebruikersnaam</label>
        <input class="form-control" id="loginUser" type="text" placeholder="Gebruikersnaam" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input class="form-control" id="loginPass" type="password" placeholder="Wachtwoord" autocomplete="current-password">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0 4px;">
        <input type="checkbox" id="rememberMe" style="width:18px;height:18px;accent-color:var(--blue);cursor:pointer;" ${S.rememberMe ? 'checked' : ''}>
        <label for="rememberMe" style="font-size:14px;color:var(--text-muted);cursor:pointer;">Inloggegevens onthouden</label>
      </div>
      <button class="btn btn-primary btn-lg" id="loginBtn" style="margin-top:8px">
        ${S.loading ? '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span>' : 'Inloggen'}
      </button>
    </div>
  </div>`;
}

function bindLogin() {
  // Herstel opgeslagen gebruikersnaam indien aanwezig
  const savedUser = localStorage.getItem('aq_saved_user');
  const savedPass = localStorage.getItem('aq_saved_pass');
  if (savedUser) {
    const uField = document.getElementById('loginUser');
    const pField = document.getElementById('loginPass');
    if (uField) uField.value = savedUser;
    if (pField && savedPass) pField.value = savedPass;
    const cb = document.getElementById('rememberMe');
    if (cb) cb.checked = true;
  }

  const go = async () => {
    const u = document.getElementById('loginUser')?.value?.trim();
    const p = document.getElementById('loginPass')?.value;
    const remember = document.getElementById('rememberMe')?.checked;
    if (!u || !p) { S.error = 'Vul beide velden in'; render(); return; }
    S.loading = true; S.error = null; S.rememberMe = remember; render();
    try {
      const data = await api('POST', '/api/login', { username: u, password: p });
      S.token = data.token; S.user = data.user;
      localStorage.setItem('aq_token', S.token);
      localStorage.setItem('aq_user', JSON.stringify(S.user));
      if (remember) {
        localStorage.setItem('aq_saved_user', u);
        localStorage.setItem('aq_saved_pass', p);
      } else {
        localStorage.removeItem('aq_saved_user');
        localStorage.removeItem('aq_saved_pass');
      }
      await initAfterLogin();
    } catch(e) { S.error = e.message; S.loading = false; render(); }
  };
  document.getElementById('loginBtn')?.addEventListener('click', go);
  document.getElementById('loginPass')?.addEventListener('keydown', e => e.key === 'Enter' && go());
  if (!document.getElementById('loginUser')?.value) document.getElementById('loginUser')?.focus();
  else document.getElementById('loginPass')?.focus();

  // 3D mouse-tilt effect on login card
  const wrap = document.querySelector('.login-wrap');
  const card = document.querySelector('.login-card');
  if (wrap && card) {
    let rafId = null;
    let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
    function animateTilt() {
      currentX += (targetX - currentX) * 0.1;
      currentY += (targetY - currentY) * 0.1;
      card.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg) translateZ(10px)`;
      card.style.boxShadow = `
        ${-currentX * 2}px ${currentY * 2 + 24}px 64px rgba(15,39,68,0.32),
        ${-currentX}px ${currentY + 6}px 20px rgba(0,87,184,0.18),
        inset 0 1px 0 rgba(255,255,255,0.9)
      `;
      rafId = requestAnimationFrame(animateTilt);
    }
    animateTilt();
    wrap.addEventListener('mousemove', e => {
      const r = wrap.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      targetX = ((e.clientX - cx) / r.width) * 10;
      targetY = -((e.clientY - cy) / r.height) * 10;
    });
    wrap.addEventListener('mouseleave', () => {
      targetX = 0; targetY = 0;
    });
    // Clean up on navigation
    card._stopTilt = () => { cancelAnimationFrame(rafId); };
  }
}

async function initAfterLogin() {
  S.loading = false;
  if (S.user.role === 'admin') {
    await loadAdminData();
    S.view = 'admin';
  } else {
    await loadMonteurData();
    S.view = 'monteur';
  }
  render();
}

// ===================================================
// ADMIN
// ===================================================
async function loadAdminData() {
  const [forms, users, lists] = await Promise.all([
    api('GET', '/api/admin/forms'),
    api('GET', '/api/admin/users'),
    api('GET', '/api/admin/lists')
  ]);
  S.forms = forms; S.users = users; S.lists = lists;
}

function renderAdmin() {
  if (S.editingForm !== null) return renderFormBuilder();
  return `
  ${renderTopNav()}
  <div class="tabs">
    <div class="tab ${S.adminTab==='forms'?'active':''}" data-tab="forms">📋 Formulieren</div>
    <div class="tab ${S.adminTab==='users'?'active':''}" data-tab="users">👤 Gebruikers</div>
    <div class="tab ${S.adminTab==='lists'?'active':''}" data-tab="lists">📂 Lijsten</div>
  </div>
  <div class="page-content" style="animation:fadeIn 0.4s var(--ease-out) both">
    ${S.error ? `<div class="alert alert-error" style="animation:slideInUp 0.4s ease">⚠ ${S.error}</div>` : ''}
    ${S.success ? `<div class="alert alert-success" style="animation:slideInUp 0.4s ease">✓ ${S.success}</div>` : ''}
    ${S.adminTab === 'forms' ? renderAdminForms() : ''}
    ${S.adminTab === 'users' ? renderAdminUsers() : ''}
    ${S.adminTab === 'lists' ? renderAdminLists() : ''}
  </div>
  ${S.modal ? renderModal() : ''}`;
}

function bindAdmin() {
  // Tabs
  document.querySelectorAll('.tab[data-tab]').forEach(t =>
    t.addEventListener('click', async () => {
      S.adminTab = t.dataset.tab; S.error = null; S.success = null; render();
    })
  );
  document.getElementById('logoutBtn')?.addEventListener('click', logout);

  if (S.adminTab === 'forms') bindAdminForms();
  if (S.adminTab === 'users') bindAdminUsers();
  if (S.adminTab === 'lists') bindAdminLists();
  if (S.modal) bindModal();
}

// --- ADMIN FORMS ---
function renderAdminForms() {
  return `
  <div class="section-header">
    <h2 class="section-title">Formulieren</h2>
    <button class="btn btn-primary" id="newFormBtn">+ Nieuw formulier</button>
  </div>
  ${S.forms.length === 0 ? `
    <div class="empty">
      <div class="empty-icon">📋</div>
      <p class="empty-text">Nog geen formulieren</p>
      <p class="empty-sub">Maak je eerste formulier aan met de knop hierboven.</p>
    </div>` : `
  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Naam</th><th>Velden</th><th>E-mail</th><th>Monteurs</th><th></th></tr></thead>
        <tbody>
        ${S.forms.map(f => {
          const assignedCount = S.users.filter(u => u.allowedForms?.includes(f.id)).length;
          return `<tr>
            <td><strong>${esc(f.name)}</strong></td>
            <td><span class="badge badge-blue">${(f.fields||[]).length} velden</span></td>
            <td class="text-sm text-muted">${esc(f.email || '—')}</td>
            <td><span class="badge badge-grey">${assignedCount} monteur${assignedCount!==1?'s':''}</span></td>
            <td>
              <div class="flex gap-1">
                <button class="btn btn-ghost btn-sm edit-form-btn" data-id="${f.id}">✏️ Bewerk</button>
                <button class="btn btn-danger btn-sm del-form-btn" data-id="${f.id}" data-name="${esc(f.name)}">🗑</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>`}`;
}

function bindAdminForms() {
  document.getElementById('newFormBtn')?.addEventListener('click', () => {
    S.editingForm = 'new';
    S.builderState = { name: '', email: '', fields: [], allowedUsers: [] };
    render();
  });
  document.querySelectorAll('.edit-form-btn').forEach(b => b.addEventListener('click', () => {
    const form = S.forms.find(f => f.id === b.dataset.id);
    if (!form) return;
    S.editingForm = form.id;
    S.builderState = {
      name: form.name || '',
      email: form.email || '',
      fields: JSON.parse(JSON.stringify(form.fields || [])),
      allowedUsers: S.users.filter(u => u.allowedForms?.includes(form.id)).map(u => u.id)
    };
    render();
  }));
  document.querySelectorAll('.del-form-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'confirm', title: 'Formulier verwijderen', message: `Weet je zeker dat je <strong>${b.dataset.name}</strong> wilt verwijderen?`, action: 'deleteForm', id: b.dataset.id };
    render();
  }));
}

// --- FORM BUILDER ---
function renderFormBuilder() {
  const bs = S.builderState;
  const fieldTypeLabels = { heading:'📌 Koptekst / instructie', text:'Tekst', textarea:'Tekstvak (groot)', number:'Nummer', email:'E-mail', phone:'Telefoon', date:'Datum', multiselect:'Meerkeuze (één antwoord)', checkbox:'Checkboxes (meerdere)', signature:'Handtekening', photo:'Foto upload', list:"Keuze uit lijst" };
  const monteurs = S.users.filter(u => u.role !== 'admin');

  return `
  ${renderTopNav()}
  <div class="form-fill-header">
    <button class="back-btn" id="backFromBuilder">←</button>
    <div>
      <div class="form-fill-title">${S.editingForm === 'new' ? 'Nieuw formulier' : 'Formulier bewerken'}</div>
      <div style="font-size:12px;opacity:0.8">${bs.name || 'Naamloos'}</div>
    </div>
    <button class="btn btn-success btn-sm" id="saveFormBtn">💾 Opslaan</button>
  </div>

  <div class="page-content">
    ${S.error ? `<div class="alert alert-error">⚠ ${S.error}</div>` : ''}

    <div class="card">
      <p class="card-title" style="margin-bottom:14px">Basisinformatie</p>
      <div class="form-group">
        <label>Naam formulier *</label>
        <input class="form-control" id="bs_name" type="text" placeholder="bijv. Onderhoudsrapport" value="${esc(bs.name)}">
      </div>
      <div class="form-group">
        <label>Bestemming e-mailadres *</label>
        <input class="form-control" id="bs_email" type="email" placeholder="ontvanger@bedrijf.nl" value="${esc(bs.email)}">
      </div>
    </div>

    ${monteurs.length > 0 ? `
    <div class="card">
      <p class="card-title" style="margin-bottom:10px">Toegang monteurs</p>
      <p class="text-sm text-muted" style="margin-bottom:10px">Selecteer welke monteurs dit formulier mogen gebruiken.</p>
      <div class="user-check-list">
        ${monteurs.map(u => `
          <div class="user-check-item">
            <input type="checkbox" id="au_${u.id}" data-uid="${u.id}" class="au-check" ${bs.allowedUsers.includes(u.id)?'checked':''}>
            <label for="au_${u.id}">${esc(u.name)} <span class="text-muted text-sm">(${esc(u.username)})</span></label>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-header">
        <div>

        ${bs.fields.map((f, i) => renderFieldCard(f, i, fieldTypeLabels)).join('')}

}

function renderFieldCard(f, i, labels) {
  const needsOptions = ['multiselect', 'checkbox'].includes(f.type);
  const needsList = f.type === 'list';
  const isHeading = f.type === 'heading';
  const options = f.options || [];
  return `
  <div class="field-card" data-idx="${i}" style="${isHeading ? 'background:linear-gradient(135deg,#EAF3FF,#F0F6FF);border-color:rgba(0,87,184,0.2)' : ''}">
    <div class="field-header">
      <div class="flex items-center gap-1">
        <span class="field-number" style="${isHeading ? 'background:linear-gradient(135deg,#0057B8,#0A79E8)' : ''}">${isHeading ? '📌' : i+1}</span>
        <strong style="font-size:14px">${esc(f.label || (isHeading ? 'Koptekst' : 'Naamloos veld'))}</strong>
      </div>
      <div class="flex gap-1">
        ${i > 0 ? `<button class="btn btn-ghost btn-sm move-up-btn" data-idx="${i}">↑</button>` : ''}
        ${i < (S.builderState.fields.length-1) ? `<button class="btn btn-ghost btn-sm move-down-btn" data-idx="${i}">↓</button>` : ''}
        <button class="btn btn-danger btn-sm del-field-btn" data-idx="${i}">🗑</button>
      </div>
    </div>
    <div class="field-row">
      <div class="form-group">
        <label>${isHeading ? 'Koptekst / instructietekst' : 'Label'}</label>
        ${isHeading
          ? `<textarea class="form-control field-label" data-idx="${i}" placeholder="bv. Stap 1 – Locatie en regio&#10;Selecteer de juiste gegevens voordat je verder gaat:&#10;• Wat is er aan de hand?&#10;• Waar bevindt het probleem zich?" style="min-height:110px;resize:vertical;font-size:14px;line-height:1.6">${esc(f.label||'')}</textarea>`
          : `<input class="form-control field-label" data-idx="${i}" type="text" placeholder="Veldnaam" value="${esc(f.label||'')}">`
        }
      </div>
      <div class="form-group">
        <label>Type</label>
        <select class="form-control field-type" data-idx="${i}">
          ${Object.entries(labels).map(([v,t]) => `<option value="${v}" ${f.type===v?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    ${!isHeading ? `
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" class="field-required" data-idx="${i}" ${f.required?'checked':''}><span class="toggle-slider"></span></label>
      <span class="text-sm">Verplicht veld</span>
    </div>` : `
    <div style="font-size:12px;color:var(--blue);opacity:0.7;margin-top:4px">📌 Dit veld toont alleen tekst — de monteur hoeft hier niets in te vullen.</div>`}
    ${needsOptions ? `
    <div class="options-list" style="margin-top:12px">
      <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Keuze-opties</label>
      <div id="opts_${i}">
        ${options.map((o,oi) => `
          <div class="option-row">
            <input class="form-control opt-val" data-fidx="${i}" data-oi="${oi}" type="text" placeholder="Optie ${oi+1}" value="${esc(o)}">
            <button class="btn btn-danger btn-sm del-opt-btn" data-fidx="${i}" data-oi="${oi}">✕</button>
          </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm add-opt-btn" data-idx="${i}" style="margin-top:6px">+ Optie toevoegen</button>
    </div>` : ''}
    ${needsList ? `
    <div class="form-group" style="margin-top:10px">
      <label>Kies lijst</label>
      <select class="form-control field-listid" data-idx="${i}">
        <option value="">-- Selecteer een lijst --</option>
        ${S.lists.map(l => `<option value="${l.id}" ${f.listId===l.id?'selected':''}>${esc(l.name)} (${l.count} items)</option>`).join('')}
      </select>
    </div>` : ''}
  </div>`;
}

function bindFormBuilder() {
  document.getElementById('backFromBuilder')?.addEventListener('click', () => {
    S.editingForm = null; S.builderState = null; S.error = null; render();
  });

  // Sync base fields
  document.getElementById('bs_name')?.addEventListener('input', e => S.builderState.name = e.target.value);
  document.getElementById('bs_email')?.addEventListener('input', e => S.builderState.email = e.target.value);

  // Allowed users
  document.querySelectorAll('.au-check').forEach(cb =>
    cb.addEventListener('change', () => {
      S.builderState.allowedUsers = Array.from(document.querySelectorAll('.au-check:checked')).map(c => c.dataset.uid);
    })
  );

  // Add field
  document.getElementById('addFieldBtn')?.addEventListener('click', () => {
    S.builderState.fields.push({ id: 'f_' + Date.now(), type: 'text', label: '', required: false, options: [] });
    render();
  });

  // Field controls
  document.querySelectorAll('.del-field-btn').forEach(b => b.addEventListener('click', () => {
    S.builderState.fields.splice(parseInt(b.dataset.idx), 1); render();
  }));
  document.querySelectorAll('.move-up-btn').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.idx);
    [S.builderState.fields[i-1], S.builderState.fields[i]] = [S.builderState.fields[i], S.builderState.fields[i-1]]; render();
  }));
  document.querySelectorAll('.move-down-btn').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.idx);
    [S.builderState.fields[i+1], S.builderState.fields[i]] = [S.builderState.fields[i], S.builderState.fields[i+1]]; render();
  }));
  document.querySelectorAll('.field-label').forEach(inp => inp.addEventListener('input', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].label = e.target.value;
    // Update header without full re-render
    const card = inp.closest('.field-card');
    if (card) card.querySelector('strong').textContent = e.target.value || 'Naamloos veld';
  }));
  document.querySelectorAll('.field-type').forEach(sel => sel.addEventListener('change', e => {
    const idx = parseInt(e.target.dataset.idx);
    S.builderState.fields[idx].type = e.target.value;
    if (!['multiselect','checkbox'].includes(e.target.value)) S.builderState.fields[idx].options = [];
    if (e.target.value !== 'list') delete S.builderState.fields[idx].listId;
    render();
  }));
  document.querySelectorAll('.field-required').forEach(cb => cb.addEventListener('change', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].required = e.target.checked;
  }));
  document.querySelectorAll('.field-listid').forEach(sel => sel.addEventListener('change', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].listId = e.target.value;
  }));

  // Options
  document.querySelectorAll('.add-opt-btn').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.idx);
    if (!S.builderState.fields[idx].options) S.builderState.fields[idx].options = [];
    S.builderState.fields[idx].options.push(''); render();
  }));
  document.querySelectorAll('.del-opt-btn').forEach(b => b.addEventListener('click', () => {
    S.builderState.fields[parseInt(b.dataset.fidx)].options.splice(parseInt(b.dataset.oi), 1); render();
  }));
  document.querySelectorAll('.opt-val').forEach(inp => inp.addEventListener('input', e => {
    S.builderState.fields[parseInt(e.target.dataset.fidx)].options[parseInt(e.target.dataset.oi)] = e.target.value;
  }));

  // Save
  document.getElementById('saveFormBtn')?.addEventListener('click', saveForm);
}

async function saveForm() {
  const bs = S.builderState;
  if (!bs.name.trim()) { S.error = 'Formuliernaam is verplicht'; render(); return; }
  if (!bs.email.trim()) { S.error = 'E-mailadres is verplicht'; render(); return; }
  S.loading = true; S.error = null; render();

  try {
    let savedForm;
    if (S.editingForm === 'new') {
      savedForm = await api('POST', '/api/admin/forms', { name: bs.name, email: bs.email, fields: bs.fields });
    } else {
      savedForm = await api('PUT', `/api/admin/forms/${S.editingForm}`, { name: bs.name, email: bs.email, fields: bs.fields });
    }

    // Update allowed users
    const allMonteurs = S.users.filter(u => u.role !== 'admin');
    await Promise.all(allMonteurs.map(async u => {
      const shouldHave = bs.allowedUsers.includes(u.id);
      const hasIt = u.allowedForms?.includes(savedForm.id);
      if (shouldHave && !hasIt) {
        const updated = await api('PUT', `/api/admin/users/${u.id}`, { allowedForms: [...(u.allowedForms||[]), savedForm.id] });
        const idx = S.users.findIndex(x => x.id === u.id); if (idx !== -1) S.users[idx] = updated;
      } else if (!shouldHave && hasIt) {
        const updated = await api('PUT', `/api/admin/users/${u.id}`, { allowedForms: (u.allowedForms||[]).filter(id => id !== savedForm.id) });
        const idx = S.users.findIndex(x => x.id === u.id); if (idx !== -1) S.users[idx] = updated;
      }
    }));

    await loadAdminData();
    S.editingForm = null; S.builderState = null; S.loading = false;
    S.success = `Formulier "${bs.name}" opgeslagen!`; S.adminTab = 'forms'; render();
  } catch(e) { S.error = e.message; S.loading = false; render(); }
}

function bindAdminLists() {

    document.getElementById('selectedFileName').textContent = fileInput.files[0]?.name || '';

  ['dragover','dragleave','drop'].forEach(evt => zone?.addEventListener(evt, e => {
    e.preventDefault();
    if (evt === 'dragover') zone.classList.add('dragover');
    else if (evt === 'dragleave') zone.classList.remove('dragover');
    else { zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; document.getElementById('selectedFileName').textContent = e.dataTransfer.files[0].name; } }

      <div style="margin-top:20px;text-align:right">
        <button class="btn btn-ghost" id="modalClose2">Sluiten</button>
      </div>`;
  }

  return `<div class="modal-overlay" id="modalOverlay"><div class="modal">${content}</div></div>`;
}

function bindModal() {
  const m = S.modal;
  const close = () => { S.modal = null; S.error = null; render(); };
  document.getElementById('modalClose')?.addEventListener('click', close);
  document.getElementById('modalClose2')?.addEventListener('click', close);
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') close(); });

  if (m.type === 'confirm') {
    document.getElementById('modalConfirm')?.addEventListener('click', async () => {
      try {
        if (m.action === 'deleteForm') {
          await api('DELETE', `/api/admin/forms/${m.id}`);
          S.forms = S.forms.filter(f => f.id !== m.id);
          S.success = 'Formulier verwijderd.';
        } else if (m.action === 'deleteUser') {
          await api('DELETE', `/api/admin/users/${m.id}`);
          S.users = S.users.filter(u => u.id !== m.id);
          S.success = 'Gebruiker verwijderd.';
        } else if (m.action === 'deleteList') {
          await api('DELETE', `/api/admin/lists/${m.id}`);
          S.lists = S.lists.filter(l => l.id !== m.id);
          S.success = 'Lijst verwijderd.';
        }
        S.modal = null; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'userForm') {
    document.getElementById('modalSaveUser')?.addEventListener('click', async () => {
      const name = document.getElementById('mu_name')?.value?.trim();
      const username = document.getElementById('mu_username')?.value?.trim();
      const pass = document.getElementById('mu_pass')?.value;
      const allowedForms = Array.from(document.querySelectorAll('.mu-form-check:checked')).map(c => c.dataset.fid);
      if (!name || !username) { S.error = 'Vul naam en gebruikersnaam in'; render(); return; }
      if (!m.user && !pass) { S.error = 'Wachtwoord is verplicht voor nieuwe gebruikers'; render(); return; }
      try {
        const payload = { name, username, role: 'monteur', allowedForms, ...(pass ? { password: pass } : {}) };
        let saved;
        if (m.user) { saved = await api('PUT', `/api/admin/users/${m.user.id}`, payload); S.users = S.users.map(u => u.id === saved.id ? saved : u); }
        else { saved = await api('POST', '/api/admin/users', payload); S.users.push(saved); }
        S.modal = null; S.success = `Gebruiker "${name}" opgeslagen.`; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'renameList') {
    document.getElementById('modalRenameList')?.addEventListener('click', async () => {
      const newName = document.getElementById('newListName')?.value?.trim();
      if (!newName) return;
      try {
        const updated = await api('PUT', `/api/admin/lists/${m.id}`, { name: newName });
        S.lists = S.lists.map(l => l.id === m.id ? { ...l, name: newName } : l);
        S.modal = null; S.success = 'Lijstnaam bijgewerkt.'; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }
}

function bindMonteur() {

    S.monteurTab = t.dataset.mtab; S.error = null; S.success = null; render();

  document.querySelectorAll('.submission-row').forEach(row => row.addEventListener('click', () => {
    const sub = S.mySubmissions.find(s => s.id === row.dataset.sid);
    if (!sub) return;
    const form = S.myForms.find(f => f.id === sub.formId);
    const fields = form?.fields || [];
    const d = new Date(sub.submittedAt);
    const datum = d.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
    const tijd = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    let details = `<p class="text-sm text-muted" style="margin-bottom:16px">${datum} om ${tijd}</p>`;
    details += fields.filter(f => f.type !== 'photo' && f.type !== 'signature').map(f => {
      const val = sub.data[f.id];
      let display = '—';
      if (f.type === 'checkbox' && Array.isArray(val)) display = val.join(', ') || '—';
      else if (val !== undefined && val !== null && val !== '') display = String(val);
      return `<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px">${esc(f.label)}</div>
        <div style="font-size:14px;padding:6px 0;border-bottom:1px solid var(--border)">${esc(display)}</div>
      </div>`;
    }).join('');
    if (sub.photoCount > 0) details += `<div style="margin-top:8px"><span class="badge badge-blue">📷 ${sub.photoCount} foto('s) verzonden</span></div>`;
    if (sub.hasSignature) details += `<div style="margin-top:6px"><span class="badge badge-blue">✓ Handtekening meegestuurd</span></div>`;
    S.modal = { type: 'submissionDetail', title: sub.formName, content: details };
    render();
  }));
  document.querySelectorAll('.form-tile').forEach(t => t.addEventListener('click', async () => {
    const form = S.myForms.find(f => f.id === t.dataset.id);
    if (!form) return;
    S.fillingForm = form;
    S.currentFieldIdx = 0;
    S.formValues = {};
    S.signatureData = null;
    S.photoFiles = [];
    S.error = null; S.success = null;
    // Preload list data
    const listFields = (form.fields||[]).filter(f => f.type === 'list' && f.listId);
    await Promise.all(listFields.map(async f => {
      if (!S.listItems[f.listId]) {
        try { const data = await api('GET', `/api/lists/${f.listId}/items`); S.listItems[f.listId] = data.items || []; }
        catch { S.listItems[f.listId] = []; }
      }
    }));
    render();
  }));
}

// --- FORM FILL ---
function fieldHasValue(f) {
  if (f.type === 'heading') return true; // heading has no value to fill in
  const val = S.formValues[f.id];
  if (f.type === 'photo') return S.photoFiles.length > 0;
  if (f.type === 'signature') return !!S.signatureData;
  if (f.type === 'checkbox') return Array.isArray(val) && val.length > 0;
  return val !== undefined && val !== null && val !== '';
}

function renderFormFill() {
  const form = S.fillingForm;
  const fields = form.fields || [];
  const total = fields.length;
  const idx = S.currentFieldIdx;
  // Progress only counts non-heading fields
  const inputFields = fields.filter(f => f.type !== 'heading');
  const inputIdx = fields.slice(0, idx).filter(f => f.type !== 'heading').length;
  const pct = inputFields.length === 0 ? 100 : Math.round((inputIdx / inputFields.length) * 100);
  const isLast = idx >= total - 1;
  const currentField = fields[idx];
  const currentHasValue = currentField ? fieldHasValue(currentField) : true;

  return `
  <div class="form-fill-header">
    <button class="back-btn" id="backFromFill">←</button>
    <div style="flex:1">
      <div class="form-fill-title">${esc(form.name)}</div>
      <div style="font-size:12px;opacity:0.8">Vraag ${inputIdx + (currentField?.type !== 'heading' ? 1 : 0)} van ${inputFields.length}</div>
    </div>
    <div style="font-size:13px;font-weight:700;opacity:0.9">${pct}%</div>
  </div>

  <div style="height:5px;background:rgba(255,255,255,0.15);overflow:hidden">
    <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(255,255,255,0.6),rgba(255,255,255,0.95));border-radius:0 3px 3px 0;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 8px rgba(255,255,255,0.4)"></div>
  </div>

  <div class="form-fill-body">
    ${S.error ? `<div class="alert alert-error" style="animation:slideInUp 0.4s ease">⚠ ${S.error}</div>` : ''}

    ${idx > 0 ? `
    <div style="margin-bottom:20px;animation:fadeIn 0.4s ease">
      ${fields.slice(0, idx).filter(f => f.type !== 'heading').map((f, fi) => {
        const val = S.formValues[f.id];
        let display = '—';
        if (f.type === 'photo') display = S.photoFiles.length > 0 ? `📷 ${S.photoFiles.length} foto('s)` : '—';
        else if (f.type === 'signature') display = S.signatureData ? '✓ Handtekening' : '—';
        else if (f.type === 'checkbox' && Array.isArray(val)) display = val.join(', ') || '—';
        else if (val) display = String(val);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(31,157,97,0.06);border:1px solid rgba(31,157,97,0.12);margin-bottom:6px;font-size:13px;animation:slideInUp ${0.2 + fi*0.05}s ease">
          <span style="color:var(--text-muted)">${esc(f.label.split('\n')[0])}</span>
          <span style="font-weight:700;color:var(--success);display:flex;align-items:center;gap:5px"><span style="animation:checkBounce 0.4s ease">✓</span> ${esc(display)}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${currentField ? `
    <div class="field-step" style="${currentField.type === 'heading'
      ? ''
      : 'padding:20px;background:rgba(255,255,255,0.8);border-radius:20px;backdrop-filter:blur(8px);border:1px solid rgba(217,229,241,0.8);box-shadow:0 8px 32px rgba(15,39,68,0.07)'}">
      ${renderFormField(currentField)}
    </div>` : ''}

    <div style="height:100px"></div>
  </div>

  <div class="submit-wrap">
    <div class="flex gap-2">
      ${idx > 0 ? `<button class="btn btn-ghost" id="prevFieldBtn" style="min-width:80px">← Terug</button>` : ''}
      ${!isLast ? `
        <button class="btn btn-primary btn-lg" id="nextFieldBtn" style="flex:1" ${!currentHasValue && currentField?.required ? 'disabled' : ''}>
          Volgende →
        </button>` : `
        <button class="btn btn-primary btn-lg" id="submitFormBtn" style="flex:1" ${S.loading?'disabled':''}>
          ${S.loading ? '<span class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white"></span> Verzenden...' : '✉ Verzenden'}
        </button>`}
    </div>
  </div>`;
}

function renderFormField(f) {
  const val = S.formValues[f.id];
  const reqMark = f.required ? ' <span style="color:var(--danger)">*</span>' : '';

  if (f.type === 'heading') {
    const lines = (f.label || '').split('\n');
    const title = lines[0];
    const body = lines.slice(1).join('\n').trim();
    // Render body: lines starting with • become list items
    const renderBody = (text) => {
      if (!text) return '';
      return text.split('\n').map(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('•') || trimmed.startsWith('-')) {
          return `<li style="margin-left:16px;margin-bottom:2px">${esc(trimmed.replace(/^[•\-]\s*/,''))}</li>`;
        }
        return trimmed ? `<p style="margin-bottom:4px">${esc(trimmed)}</p>` : '';
      }).join('');
    };
    const bodyHtml = renderBody(body);
    const hasList = bodyHtml.includes('<li');
    return `<div style="background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1px solid rgba(0,87,184,0.18);border-radius:16px;padding:18px 20px;text-align:left">
      <div style="font-size:16px;font-weight:900;color:#1d4ed8;margin-bottom:${body?'10px':'0'};letter-spacing:-0.2px">${esc(title)}</div>
      ${body ? `<div style="font-size:14px;color:#374151;line-height:1.7">${hasList ? `<ul style="list-style:disc;padding-left:4px">${bodyHtml}</ul>` : bodyHtml}</div>` : ''}
    </div>`;
  }

  if (f.type === 'text' || f.type === 'email' || f.type === 'phone' || f.type === 'number') {
    const inputType = f.type === 'phone' ? 'tel' : f.type;
    return `<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <input class="form-control fill-input" data-id="${f.id}" type="${inputType}" value="${esc(val||'')}" placeholder="${esc(f.label)}"></div>`;
  }
  if (f.type === 'textarea') {
    return `<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <textarea class="form-control fill-input" data-id="${f.id}" placeholder="${esc(f.label)}">${esc(val||'')}</textarea></div>`;
  }
  if (f.type === 'date') {
    return `<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <input class="form-control fill-input" data-id="${f.id}" type="date" value="${esc(val||'')}"></div>`;
  }
  if (f.type === 'multiselect') {
    const opts = f.options || [];
    return `<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <div class="check-group">
        ${opts.map(o => `<div class="check-item"><input type="radio" id="r_${f.id}_${esc(o)}" name="r_${f.id}" class="fill-radio" data-id="${f.id}" value="${esc(o)}" ${val===o?'checked':''}><label for="r_${f.id}_${esc(o)}">${esc(o)}</label></div>`).join('')}
      </div></div>`;
  }
  if (f.type === 'checkbox') {
    const opts = f.options || [];
    const checked = Array.isArray(val) ? val : [];
    return `<div class="form-group"><label>${esc(f.label)}${reqMark}</label>
      <div class="check-group">
        ${opts.map(o => `<div class="check-item"><input type="checkbox" id="c_${f.id}_${esc(o)}" class="fill-checkbox" data-id="${f.id}" value="${esc(o)}" ${checked.includes(o)?'checked':''}><label for="c_${f.id}_${esc(o)}">${esc(o)}</label></div>`).join('')}
      </div></div>`;
  }
  if (f.type === 'list') {
    const items = S.listItems[f.listId] || [];
    return `<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <div class="dropdown-wrap" id="ddwrap_${f.id}">
        <input class="form-control dd-search" data-id="${f.id}" type="text" placeholder="Zoeken of selecteren..." value="${esc(val||'')}" autocomplete="off" readonly>
        <div class="dropdown-list hidden" id="ddlist_${f.id}">
          ${items.map(item => `<div class="dropdown-item ${val===item?'selected':''}" data-id="${f.id}" data-val="${esc(item)}">${esc(item)}</div>`).join('')}
        </div>
      </div></div>`;
  }
  if (f.type === 'signature') {
    const hasSig = !!S.signatureData;
    return `<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <div class="sig-wrap">
        <canvas class="sig-canvas" id="sig_${f.id}" data-id="${f.id}" width="600" height="160"></canvas>
        <div class="sig-actions">
          <button class="btn btn-ghost btn-sm sig-clear-btn" data-id="${f.id}">✕ Wissen</button>
          ${hasSig ? '<span class="text-sm" style="color:var(--success)">✓ Handtekening gezet</span>' : '<span class="text-sm text-muted">Teken hier je handtekening</span>'}
        </div>
      </div></div>`;
  }
  if (f.type === 'photo') {
    return `<div class="form-group">
      <label>${esc(f.label)}${reqMark}</label>
      <input type="file" accept="image/*" capture="environment" multiple id="photo_${f.id}" data-id="${f.id}" class="fill-photo hidden">
      <button class="btn btn-outline" onclick="document.getElementById('photo_${f.id}').click()">📷 Foto('s) toevoegen</button>
      <div class="photo-grid" id="photoGrid_${f.id}">
        ${S.photoFiles.map((pf,i) => `
          <div class="photo-thumb">
            <img src="${URL.createObjectURL(pf)}" alt="foto">
            <button class="photo-remove" data-pi="${i}">×</button>
          </div>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function bindMonteur2() {
  document.getElementById('backFromFill')?.addEventListener('click', () => {
    S.fillingForm = null; S.currentFieldIdx = 0; S.error = null; S.success = null; render();
  });

  // Navigatie: volgende veld
  document.getElementById('nextFieldBtn')?.addEventListener('click', () => {
    const fields = S.fillingForm.fields || [];
    const current = fields[S.currentFieldIdx];
    if (current?.required && !fieldHasValue(current)) {
      S.error = `Veld "${current.label}" is verplicht.`; render(); return;
    }
    S.error = null;
    S.currentFieldIdx = Math.min(S.currentFieldIdx + 1, fields.length - 1);
    render();
  });

  // Navigatie: vorig veld
  document.getElementById('prevFieldBtn')?.addEventListener('click', () => {
    S.error = null;
    S.currentFieldIdx = Math.max(S.currentFieldIdx - 1, 0);
    render();
  });

  // Automatisch doorschakelen bij invullen (optioneel voor radio/checkbox/list)
  const autoNext = () => {
    const fields = S.fillingForm.fields || [];
    const current = fields[S.currentFieldIdx];
    if (current && fieldHasValue(current) && S.currentFieldIdx < fields.length - 1) {
      setTimeout(() => { S.currentFieldIdx++; render(); }, 300);
    }
  };

  // Text/date/email/etc
  document.querySelectorAll('.fill-input').forEach(el => el.addEventListener('input', e => {
    S.formValues[e.target.dataset.id] = e.target.value;
    // Update next button state without full re-render
    const nextBtn = document.getElementById('nextFieldBtn');
    if (nextBtn) {
      const fields = S.fillingForm.fields || [];
      const current = fields[S.currentFieldIdx];
      nextBtn.disabled = current?.required && !fieldHasValue(current);
    }
  }));
  // Radio
  document.querySelectorAll('.fill-radio').forEach(el => el.addEventListener('change', e => {
    if (e.target.checked) { S.formValues[e.target.dataset.id] = e.target.value; autoNext(); }
  }));
  // Checkbox
  document.querySelectorAll('.fill-checkbox').forEach(el => el.addEventListener('change', () => {
    const id = el.dataset.id;
    const checked = Array.from(document.querySelectorAll(`.fill-checkbox[data-id="${id}"]:checked`)).map(c => c.value);
    S.formValues[id] = checked;
  }));

  // Dropdown lists
  document.querySelectorAll('.dd-search').forEach(inp => {
    const id = inp.dataset.id;
    const list = document.getElementById(`ddlist_${id}`);

    inp.addEventListener('click', () => {
      inp.readOnly = false;
      list?.classList.remove('hidden');
    });
    inp.addEventListener('input', () => {
      const q = inp.value.toLowerCase();
      list?.querySelectorAll('.dropdown-item').forEach(item => {
        item.style.display = item.dataset.val.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
  document.querySelectorAll('.dropdown-item').forEach(item => item.addEventListener('click', e => {
    const id = item.dataset.id;
    const val = item.dataset.val;
    S.formValues[id] = val;
    const inp = document.querySelector(`.dd-search[data-id="${id}"]`);
    if (inp) { inp.value = val; inp.readOnly = true; }
    document.getElementById(`ddlist_${id}`)?.classList.add('hidden');
    document.querySelectorAll(`#ddlist_${id} .dropdown-item`).forEach(i => i.classList.toggle('selected', i.dataset.val === val));
  }));
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('dd-search') && !e.target.classList.contains('dropdown-item')) {
      document.querySelectorAll('.dropdown-list').forEach(l => l.classList.add('hidden'));
    }
  });

  // Signature pads
  document.querySelectorAll('.sig-canvas').forEach(canvas => {
    setupSignaturePad(canvas);
  });
  document.querySelectorAll('.sig-clear-btn').forEach(btn => btn.addEventListener('click', () => {
    S.signatureData = null;
    const canvas = document.getElementById(`sig_${btn.dataset.id}`);
    if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
    render();
  }));

  // Photo upload
  document.querySelectorAll('.fill-photo').forEach(inp => inp.addEventListener('change', () => {
    for (const file of inp.files) S.photoFiles.push(file);
    render();
  }));
  document.querySelectorAll('.photo-remove').forEach(btn => btn.addEventListener('click', () => {
    S.photoFiles.splice(parseInt(btn.dataset.pi), 1); render();
  }));

  // Submit
  document.getElementById('submitFormBtn')?.addEventListener('click', submitForm);
}

function setupSignaturePad(canvas) {
  const ctx = canvas.getContext('2d');
  // Resize canvas to actual display size
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width || 600;
  canvas.height = 160;

  ctx.strokeStyle = '#1C2833';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false, lastX = 0, lastY = 0;

  const getPos = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };

  const start = e => { e.preventDefault(); drawing = true; const p = getPos(e, canvas); lastX = p.x; lastY = p.y; ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = e => {
    if (!drawing) return; e.preventDefault();
    const p = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  const stop = e => {
    if (!drawing) return; e.preventDefault(); drawing = false;
    S.signatureData = canvas.toDataURL('image/png');
  };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}

async function submitForm() {
  const form = S.fillingForm;
  S.error = null;

  // Validate required fields
  for (const field of (form.fields||[])) {
    if (!field.required) continue;
    const val = field.type === 'signature' ? S.signatureData : S.formValues[field.id];
    const empty = val === undefined || val === null || val === '' || (Array.isArray(val) && val.length === 0);
    if (empty) { S.error = `Veld "${field.label}" is verplicht.`; render(); return; }
  }

  S.loading = true; render();

  try {
    const fd = new FormData();
    fd.append('data', JSON.stringify(S.formValues));
    if (S.signatureData) fd.append('signature', S.signatureData);
    S.photoFiles.forEach((f, i) => fd.append('photos', f, f.name || `foto_${i}.jpg`));

    const result = await api('POST', `/api/submit/${form.id}`, fd, true);
    S.loading = false; S.fillingForm = null;
    S.formValues = {}; S.signatureData = null; S.photoFiles = [];
    S.success = result.message || 'Formulier succesvol verzonden!';
    render();
  } catch(e) { S.error = e.message; S.loading = false; render(); }
}

function logout() {
  localStorage.removeItem('aq_token'); localStorage.removeItem('aq_user');
  S = { ...S, token: null, user: null, view: 'login', error: null, success: null, fillingForm: null, editingForm: null, modal: null };
  render();
}

// ===================================================
// UTILS
// ===================================================
function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// Override render to auto-bind
const _render = render;
window.render = function() {
  _render();
  bindAfterRender();
};

// ===================================================
// INIT
// ===================================================
async function init() {
  S.view = 'loading'; render();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW fout:', e));
  }

  if (S.token && S.user) {
    try {
      await api('GET', '/api/me');
      await initAfterLogin();
    } catch {
      logout();
    }
  } else {
    S.view = 'login'; render();
  }
}

init();
</script>
</body>
