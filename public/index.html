<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0057B8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AquaApp">
  <link rel="manifest" href="/manifest.json">
  <title>AquaApp</title>
  <style>
:root {
  --blue: #0057B8;
  --blue-dark: #003E87;
  --blue-ink: #0F2744;
  --blue-light: #EAF3FF;
  --blue-soft: #F4F8FD;
  --grey: #94A3B8;
  --grey-light: #F6F9FC;
  --surface: rgba(255,255,255,0.94);
  --surface-solid: #FFFFFF;
  --surface-alt: #F8FBFE;
  --border: #D9E5F1;
  --border-strong: #C7D8E8;
  --text: #1E293B;
  --text-muted: #64748B;
  --white: #FFFFFF;
  --success: #1F9D61;
  --danger: #D64545;
  --warning: #D98A00;
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --shadow-xs: 0 2px 8px rgba(15,39,68,0.04);
  --shadow: 0 10px 30px rgba(15,39,68,0.08);
  --shadow-lg: 0 22px 50px rgba(15,39,68,0.14);
  --shadow-focus: 0 0 0 4px rgba(0,87,184,0.12);
  --gradient-brand: linear-gradient(135deg, #0B2540 0%, #004FAD 52%, #0A79E8 100%);
  --gradient-brand-soft: linear-gradient(135deg, #EAF3FF 0%, #F7FAFE 100%);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 25%),
    linear-gradient(180deg, #F5F9FD 0%, #ECF3F9 100%);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.45;
}

#app { min-height: 100vh; }

a { color: inherit; }
button, input, select, textarea { font: inherit; }

/* ===== UTILITIES ===== */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 8px; }
.gap-2 { gap: 16px; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.w-full { width: 100%; }
.text-sm { font-size: 13px; }
.text-muted { color: var(--text-muted); }
.bold { font-weight: 600; }

/* ===== LOADER ===== */
.loader-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid rgba(0,87,184,0.12);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes slideInRight { from { opacity:0; transform:translateX(40px) scale(0.96); } to { opacity:1; transform:translateX(0) scale(1); } }
@keyframes slideInUp { from { opacity:0; transform:translateY(30px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes popIn { from { opacity:0; transform:scale(0.85) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes float { 0%,100% { transform:translateY(0px) rotateX(0deg); } 50% { transform:translateY(-6px) rotateX(1deg); } }
@keyframes shimmer { 0% { background-position:200% center; } 100% { background-position:-200% center; } }
@keyframes progressFill { from { width:0%; } }
@keyframes glowPulse { 0%,100% { box-shadow:0 0 20px rgba(0,87,184,0.3); } 50% { box-shadow:0 0 40px rgba(0,87,184,0.6); } }
@keyframes checkBounce { 0% { transform:scale(0); } 60% { transform:scale(1.3); } 100% { transform:scale(1); } }

/* ===== LOGO ===== */
.logo {
  font-size: 28px;
  font-weight: 900;
  color: var(--blue);
  letter-spacing: -1.2px;
  position: relative;
  display: inline-block;
  text-transform: lowercase;
}
.logo .crown {
  font-size: 12px;
  color: rgba(15,39,68,0.45);
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%);
}
.logo-white { color: var(--white); }
.logo-white .crown { color: rgba(255,255,255,0.72); }

/* ===== LOGIN ===== */
.login-wrap {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  perspective: 1200px;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(10,121,232,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(0,62,135,0.28) 0%, transparent 50%),
    radial-gradient(circle at top left, rgba(255,255,255,0.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 22%),
    var(--gradient-brand);
  overflow: hidden;
}
.login-wrap::before {
  content: '';
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle at 25% 40%, rgba(255,255,255,0.04) 0%, transparent 35%),
    radial-gradient(circle at 75% 60%, rgba(0,87,184,0.15) 0%, transparent 35%);
  pointer-events: none;
  animation: bgFloat 8s ease-in-out infinite alternate;
}
@keyframes bgFloat {
  from { transform: translateX(-15px) translateY(-10px); }
  to   { transform: translateX(15px) translateY(10px); }
}
.login-card {
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px) saturate(180%);
  border-radius: 28px;
  padding: 42px 34px 34px;
  width: 100%;
  max-width: 420px;
  box-shadow:
    0 32px 80px rgba(15,39,68,0.28),
    0 8px 20px rgba(0,87,184,0.14),
    inset 0 1px 0 rgba(255,255,255,0.9);
  border: 1px solid rgba(255,255,255,0.6);
  transform-style: preserve-3d;
  transition: transform 0.12s var(--ease-out), box-shadow 0.3s var(--ease-smooth);
  animation: cardAppear 0.9s var(--ease-spring) both;
  will-change: transform;
}
@keyframes cardAppear {
  from {
    opacity: 0;
    transform: translateY(60px) rotateX(12deg) scale(0.92);
  }
  to {
    opacity: 1;
    transform: translateY(0) rotateX(0deg) scale(1);
  }
}
.login-card .logo {
  animation: logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat {
  0%,100% { transform: translateY(0px); filter: drop-shadow(0 4px 12px rgba(0,87,184,0.25)); }
  50%      { transform: translateY(-5px); filter: drop-shadow(0 10px 20px rgba(0,87,184,0.35)); }
}
.login-logo { text-align: center; margin-bottom: 30px; }
.login-logo .logo { font-size: 42px; }
.login-logo .logo .crown { font-size: 16px; top: -14px; }
.login-subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 10px;
  line-height: 1.55;
}

/* ===== FORM ELEMENTS ===== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 7px;
}
.form-control {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-size: 15px;
  color: var(--text);
  background: var(--surface-solid);
  transition: border-color 0.22s var(--ease-smooth), box-shadow 0.22s var(--ease-smooth), transform 0.18s var(--ease-spring);
  outline: none;
}
.form-control:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.form-control:focus {
  border-color: var(--blue);
  box-shadow: var(--shadow-focus), 0 4px 16px rgba(0,87,184,0.08);
  transform: translateY(-1px);
}
.form-control::placeholder { color: #97A6B8; }
textarea.form-control {
  resize: vertical;
  min-height: 96px;
}
select.form-control { cursor: pointer; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  transition: transform 0.2s var(--ease-spring), box-shadow 0.2s var(--ease-smooth), background 0.2s ease, filter 0.2s ease;
  text-decoration: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
  border-radius: inherit;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }
.btn:hover { transform: translateY(-2px) scale(1.015); }
.btn:active { transform: translateY(1px) scale(0.975); transition-duration: 0.07s; }
.btn-primary {
  background: linear-gradient(145deg, #0A79E8, var(--blue), var(--blue-dark));
  background-size: 200% 200%;
  color: var(--white);
  box-shadow: 0 8px 24px rgba(0,87,184,0.28), 0 2px 6px rgba(0,87,184,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-primary:hover {
  background-position: right center;
  box-shadow: 0 14px 36px rgba(0,87,184,0.38), 0 4px 12px rgba(0,87,184,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
  filter: brightness(1.06);
}
.btn-outline {
  background: var(--white);
  color: var(--blue);
  border: 1.5px solid var(--border);
}
.btn-outline:hover {
  background: var(--blue-light);
  border-color: #BFD4EB;
}
.btn-danger {
  background: linear-gradient(135deg, #E05555, #C73E3E);
  color: var(--white);
}
.btn-danger:hover { box-shadow: 0 10px 22px rgba(214,69,69,0.22); }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-alt); }
.btn-success {
  background: linear-gradient(135deg, #1F9D61, #2DBE77);
  color: var(--white);
}
.btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 12px; }
.btn-lg { padding: 14px 20px; font-size: 16px; width: 100%; border-radius: 16px; letter-spacing: 0.01em; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

/* Login card button shimmer */
.login-card .btn-primary {
  background: linear-gradient(145deg, #0057B8, #0A79E8, #003E87, #0057B8);
  background-size: 300% 100%;
  animation: btnShimmer 4s ease-in-out infinite;
  box-shadow: 0 10px 32px rgba(0,87,184,0.38), 0 3px 8px rgba(0,87,184,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
}
@keyframes btnShimmer {
  0%   { background-position: 0% center; }
  50%  { background-position: 100% center; }
  100% { background-position: 0% center; }
}
.login-card .btn-primary:hover {
  animation: none;
  background-position: right center;
  filter: brightness(1.1);
  box-shadow: 0 16px 44px rgba(0,87,184,0.46), 0 4px 12px rgba(0,87,184,0.26), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* ===== ALERTS ===== */
.alert {
  padding: 14px 16px;
  border-radius: 16px;
  font-size: 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  border: 1px solid transparent;
  box-shadow: var(--shadow-xs);
}
.alert-error { background: #FEF2F2; color: #B42318; border-color: #F9C8C8; }
.alert-success { background: #EEF9F3; color: #16794B; border-color: #B9E4CA; }
.alert-info { background: #EFF6FF; color: #1D4E89; border-color: #C7DCF6; }

/* ===== NAV ===== */
.topnav {
  background: linear-gradient(90deg, #0B1D35 0%, #0D3070 40%, #0057B8 100%);
  color: var(--white);
  padding: 0 24px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(15,39,68,0.24), 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(12px) saturate(160%);
  animation: navSlideDown 0.6s var(--ease-out) both;
}
@keyframes navSlideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.topnav .logo { font-size: 24px; color: var(--white); }
.topnav .logo .crown { color: rgba(255,255,255,0.72); font-size: 11px; top: -9px; }
.nav-user {
  font-size: 13px;
  opacity: 0.96;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
}
.nav-logout {
  background: rgba(255,255,255,0.14);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.nav-logout:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

/* ===== TABS ===== */
.tabs {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(217,229,241,0.95);
  padding: 0 24px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  position: sticky;
  top: 70px;
  z-index: 90;
}
.tab {
  padding: 16px 18px 14px;
  font-size: 14px;
  font-weight: 800;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color 0.2s var(--ease-smooth), border-color 0.2s var(--ease-smooth), background 0.2s ease, transform 0.18s var(--ease-spring);
  user-select: none;
  border-radius: 12px 12px 0 0;
  position: relative;
}
.tab:hover { color: var(--blue); background: rgba(234,243,255,0.72); transform: translateY(-1px); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 20%;
  right: 20%;
  height: 3px;
  background: var(--blue);
  border-radius: 3px 3px 0 0;
  animation: tabUnderline 0.3s var(--ease-spring) both;
}
@keyframes tabUnderline {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 1; }
}

/* ===== CONTENT ===== */
.page-content {
  padding: 32px 24px 28px;
  max-width: 1180px;
  margin: 0 auto;
}

/* ===== CARDS ===== */
.card {
  background: var(--surface);
  backdrop-filter: blur(10px) saturate(140%);
  border-radius: 20px;
  box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
  padding: 24px;
  margin-bottom: 18px;
  border: 1px solid rgba(217,229,241,0.95);
  transition: transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease-smooth);
  animation: fadeIn 0.5s var(--ease-out) both;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg), 0 1px 0 rgba(255,255,255,0.8) inset;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.card-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}
.card-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== TABLE ===== */
.table-wrap {
  overflow-x: auto;
  border-radius: 18px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: #F6FAFE;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 14px;
  border-bottom: 1px solid rgba(217,229,241,0.92);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(248,251,254,0.95); }
.badge {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-blue { background: #EAF3FF; color: var(--blue); }
.badge-grey { background: #F1F5F9; color: var(--text-muted); }

/* ===== FORM BUILDER ===== */
.field-card {
  background: linear-gradient(180deg, #F9FBFE 0%, #F4F8FC 100%);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
}
.field-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}
.field-number {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #2A7DE1);
  color: white;
  font-size: 12px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.field-row { display: flex; gap: 12px; flex-wrap: wrap; }
.field-row .form-group { flex: 1; min-width: 150px; margin-bottom: 8px; }
.options-list { margin-top: 8px; }
.option-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.option-row .form-control { flex: 1; padding: 9px 12px; font-size: 13px; }
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #D4DCE6;
  border-radius: 999px;
  transition: 0.3s;
}
.toggle-slider:before {
  position: absolute;
  content: '';
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
}
.toggle input:checked + .toggle-slider { background: var(--blue); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* ===== MONTEUR FORM TILES ===== */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 18px;
  perspective: 900px;
}
.form-tile {
  background: linear-gradient(160deg, rgba(255,255,255,0.99) 0%, rgba(240,248,255,0.97) 100%);
  border-radius: 20px;
  padding: 24px 18px;
  cursor: pointer;
  box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.9) inset;
  border: 1px solid rgba(217,229,241,0.95);
  transition: transform 0.28s var(--ease-spring), box-shadow 0.28s var(--ease-smooth), border-color 0.22s ease;
  text-align: center;
  transform-style: preserve-3d;
  will-change: transform;
  position: relative;
  overflow: hidden;
}
.form-tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.3) 0%, transparent 60%);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.28s;
  pointer-events: none;
}
.form-tile:hover::before { opacity: 1; }
.form-tile:hover {
  border-color: rgba(0,87,184,0.2);
  box-shadow: 0 24px 56px rgba(15,39,68,0.16), 0 8px 20px rgba(0,87,184,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
  transform: translateY(-6px) rotateX(3deg) scale(1.02);
}
.form-tile:active {
  transform: translateY(-1px) scale(0.98);
  transition-duration: 0.08s;
}
.form-tile-icon {
  width: 60px;
  height: 60px;
  border-radius: 18px;
  background: linear-gradient(145deg, #EAF3FF, #D4E8FF);
  color: var(--blue);
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 6px 16px rgba(0,87,184,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
  transition: transform 0.28s var(--ease-spring);
}
.form-tile:hover .form-tile-icon {
  transform: translateY(-4px) scale(1.08);
}
.form-tile-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}
.form-tile-fields { font-size: 12px; color: var(--text-muted); }

/* ===== FORM FILL ===== */
.form-fill-header {
  background: linear-gradient(90deg, #0B1D35 0%, #0D3070 40%, #0057B8 100%);
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;

<body>
<div id="app"></div>
<script>
// ===================================================
// STATE
// ===================================================
let S = {
  token: localStorage.getItem('aq_token'),
  user: JSON.parse(localStorage.getItem('aq_user') || 'null'),
  view: 'loading',
  adminTab: 'forms',
  // Admin data
  forms: [], users: [], lists: [], allSubmissions: [],
  // Form builder
  editingForm: null,
  builderState: null,
  // Monteur
  myForms: [],
  mySubmissions: [],
  monteurTab: 'forms',
  fillingForm: null,
  currentFieldIdx: 0,
  formValues: {},
  signatureData: null,
  photoFiles: [],
  // UI
  loading: false, error: null, success: null,
  modal: null,
  dropdownOpen: null,
  listItems: {},
  showConditions: false
};

// ===================================================
// API
// ===================================================
async function api(method, url, data = null, isForm = false) {
  const headers = {};
  if (S.token) headers['Authorization'] = `Bearer ${S.token}`;
  if (!isForm && data) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, {
    method,
    headers,
    body: isForm ? data : (data ? JSON.stringify(data) : null)
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Er is een fout opgetreden');
  return json;
}

// ===================================================
// RENDER DISPATCHER
// ===================================================
function render() {
  const app = document.getElementById('app');
  if (S.view === 'loading') { app.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p style="color:var(--blue);font-weight:600">Laden...</p></div>`; return; }
  if (S.view === 'login') { app.innerHTML = renderLogin(); bindLogin(); return; }
  if (S.view === 'register') { app.innerHTML = renderRegister(); bindRegister(); return; }
  if (S.view === 'forgot') { app.innerHTML = renderForgot(); bindForgot(); return; }
  if (S.view === 'reset') { app.innerHTML = renderReset(); bindReset(); return; }
  if (S.view === 'admin') { app.innerHTML = renderAdmin(); bindAdmin(); return; }
  if (S.view === 'monteur') { app.innerHTML = renderMonteur(); bindMonteur(); return; }
  if (S.view === 'submitted') { app.innerHTML = renderSubmittedScreen(); bindSubmittedScreen(); return; }
}

// ===================================================
// LOGIN
// ===================================================
function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo">
          <span class="crown">♛</span>
          aqua+
        </div>
        <p class="login-subtitle">Inloggen voor monteurs & beheerders</p>
      </div>
      ${S.error ? `<div class="alert alert-error">⚠ ${S.error}</div>` : ''}
      <div class="form-group">
        <label>Gebruikersnaam</label>
        <input class="form-control" id="loginUser" type="text" placeholder="Gebruikersnaam" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input class="form-control" id="loginPass" type="password" placeholder="Wachtwoord" autocomplete="current-password">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0 4px;">
        <input type="checkbox" id="rememberMe" style="width:18px;height:18px;accent-color:var(--blue);cursor:pointer;" ${S.rememberMe ? 'checked' : ''}>
        <label for="rememberMe" style="font-size:14px;color:var(--text-muted);cursor:pointer;">Inloggegevens onthouden</label>
      </div>
      <button class="btn btn-primary btn-lg" id="loginBtn" style="margin-top:8px">
        ${S.loading ? '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span>' : 'Inloggen'}
      </button>
      <div style="display:flex;justify-content:space-between;margin-top:14px">
        <a href="#" id="toForgot" style="color:var(--blue);font-size:13px">Wachtwoord vergeten?</a>
        <a href="#" id="toRegister" style="color:var(--blue);font-size:13px">Account aanmaken</a>
      </div>
    </div>
  </div>`;
}

function bindLogin() {
  // Herstel opgeslagen gebruikersnaam indien aanwezig
  const savedUser = localStorage.getItem('aq_saved_user');
  const savedPass = localStorage.getItem('aq_saved_pass');
  if (savedUser) {
    const uField = document.getElementById('loginUser');
    const pField = document.getElementById('loginPass');
    if (uField) uField.value = savedUser;
    if (pField && savedPass) pField.value = savedPass;
    const cb = document.getElementById('rememberMe');
    if (cb) cb.checked = true;
  }

  const go = async () => {
    const u = document.getElementById('loginUser')?.value?.trim();
    const p = document.getElementById('loginPass')?.value;
    const remember = document.getElementById('rememberMe')?.checked;
    if (!u || !p) { S.error = 'Vul beide velden in'; render(); return; }
    S.loading = true; S.error = null; S.rememberMe = remember; render();
    try {
      const data = await api('POST', '/api/login', { username: u, password: p });
      S.token = data.token; S.user = data.user;
      localStorage.setItem('aq_token', S.token);
      localStorage.setItem('aq_user', JSON.stringify(S.user));
      if (remember) {
        localStorage.setItem('aq_saved_user', u);
        localStorage.setItem('aq_saved_pass', p);
      } else {
        localStorage.removeItem('aq_saved_user');
        localStorage.removeItem('aq_saved_pass');
      }
      await initAfterLogin();
    } catch(e) { S.error = e.message; S.loading = false; render(); }
  };
  document.getElementById('loginBtn')?.addEventListener('click', go);
  document.getElementById('loginPass')?.addEventListener('keydown', e => e.key === 'Enter' && go());
  if (!document.getElementById('loginUser')?.value) document.getElementById('loginUser')?.focus();
  else document.getElementById('loginPass')?.focus();

  // 3D mouse-tilt effect on login card
  const wrap = document.querySelector('.login-wrap');
  const card = document.querySelector('.login-card');
  if (wrap && card) {
    let rafId = null;
    let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
    function animateTilt() {
      currentX += (targetX - currentX) * 0.1;
      currentY += (targetY - currentY) * 0.1;
      card.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg) translateZ(10px)`;
      card.style.boxShadow = `
        ${-currentX * 2}px ${currentY * 2 + 24}px 64px rgba(15,39,68,0.32),
        ${-currentX}px ${currentY + 6}px 20px rgba(0,87,184,0.18),
        inset 0 1px 0 rgba(255,255,255,0.9)
      `;
      rafId = requestAnimationFrame(animateTilt);
    }
    animateTilt();
    wrap.addEventListener('mousemove', e => {
      const r = wrap.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      targetX = ((e.clientX - cx) / r.width) * 10;
      targetY = -((e.clientY - cy) / r.height) * 10;
    });
    wrap.addEventListener('mouseleave', () => {
      targetX = 0; targetY = 0;
    });
    // Clean up on navigation
    card._stopTilt = () => { cancelAnimationFrame(rafId); };
  }

  document.getElementById('toRegister')?.addEventListener('click', () => { S.error = null; S.view = 'register'; render(); });
  document.getElementById('toForgot')?.addEventListener('click', () => { S.error = null; S.view = 'forgot'; render(); });
}

// ===================================================
// REGISTRATIE
// ===================================================
function renderRegister() {
  const REGIO_OPTIONS = ['Noord-Holland','Zuid-Holland','Utrecht','Gelderland','Noord-Brabant','Zeeland','Limburg','Overijssel','Groningen','Friesland','Drenthe','Flevoland'];
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo"><span class="crown">♛</span>aqua+</div>
        <p class="login-subtitle">Nieuw account aanmaken</p>
      </div>
      ${S.error ? `<div class="alert alert-error">⚠ ${S.error}</div>` : ''}
      ${S.success ? `<div class="alert alert-success">✓ ${S.success}</div>` : ''}
      <div class="form-group">
        <label>Volledige naam</label>
        <input class="form-control" id="regName" type="text" placeholder="Jan de Vries" autocomplete="name">
      </div>
      <div class="form-group">
        <label>E-mailadres</label>
        <input class="form-control" id="regEmail" type="email" placeholder="jan@aqua.nl" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Regio</label>
        <select class="form-control" id="regRegio">
          <option value="">Kies je regio...</option>
          ${REGIO_OPTIONS.map(r => `<option value="${r}">${r}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Wachtwoord <span style="font-size:11px;color:var(--text-muted)">(minimaal 6 tekens)</span></label>
        <input class="form-control" id="regPass" type="password" placeholder="Wachtwoord" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Wachtwoord bevestigen</label>

async function loadAdminData() {
  const [forms, users, lists, submissions] = await Promise.all([
    api('GET', '/api/admin/forms'),
    api('GET', '/api/admin/users'),

function renderConditionsEditor() {
  const bs = S.builderState;
  const conditions = bs.conditions || [];
  // Only fields that can act as trigger (have a label, not divider)
  const triggerFields = bs.fields.filter(f => f.type !== 'divider' && f.type !== 'heading' && f.label);
  // All fields that can be shown/hidden (not divider)
  const targetFields  = bs.fields.filter(f => f.type !== 'divider' && f.label);

  const fieldLabel = (id) => {
    const f = bs.fields.find(x => x.id === id);
    return f ? esc(f.label.split('\n')[0]) : `(veld ${id})`;
  };

  const operators = [
    { v: 'equals',     l: 'is gelijk aan' },
    { v: 'not_equals', l: 'is niet gelijk aan' },
    { v: 'contains',   l: 'bevat' },
    { v: 'not_empty',  l: 'is ingevuld' },
    { v: 'empty',      l: 'is leeg' },
  ];

  return `
  <div style="background:#FFF8E7;border-bottom:2px solid #F0C040;padding:20px 24px;animation:slideInUp 0.3s ease">
    <div style="max-width:900px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">

          <div style="font-size:17px;font-weight:900;color:#92400E">⚡ Voorwaarden</div>
          <div style="font-size:13px;color:#B45309;margin-top:2px">Bepaal welke velden zichtbaar worden op basis van antwoorden.</div>
        </div>
        <button class="btn btn-ghost btn-sm" id="closeConditionsBtn">✕ Sluiten</button>
      </div>

      ${conditions.length === 0 ? `
      <div style="text-align:center;padding:20px;color:#B45309;font-size:13px;background:rgba(255,255,255,0.6);border-radius:12px;border:1px dashed #F0C040">
        Nog geen voorwaarden. Klik op "Regel toevoegen" om te beginnen.
      </div>` : `
      <div style="display:flex;flex-direction:column;gap:10px">
        ${conditions.map((c, ci) => {
          const ifField = bs.fields.find(f => f.id === c.ifFieldId);
          const showValue = c.operator !== 'not_empty' && c.operator !== 'empty';
          // For multiselect/checkbox: show options as datalist
          const hasOptions = ifField && ['multiselect','checkbox'].includes(ifField.type) && ifField.options?.length;
          return `
          <div style="background:white;border-radius:14px;padding:14px 16px;border:1px solid rgba(240,192,64,0.4);display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
            <span style="font-size:12px;font-weight:800;color:#92400E;white-space:nowrap">ALS</span>
            <select class="form-control cond-if-field" data-ci="${ci}" style="flex:2;min-width:140px;font-size:13px">
              <option value="">-- Kies vraag --</option>
              ${triggerFields.map(f => `<option value="${f.id}" ${c.ifFieldId===f.id?'selected':''}>${esc(f.label.split('\n')[0])}</option>`).join('')}
            </select>
            <select class="form-control cond-operator" data-ci="${ci}" style="flex:1;min-width:130px;font-size:13px">
              ${operators.map(o => `<option value="${o.v}" ${c.operator===o.v?'selected':''}>${o.l}</option>`).join('')}
            </select>
            ${showValue ? `
            <div style="flex:1;min-width:110px;position:relative">
              <input class="form-control cond-value" data-ci="${ci}" type="text" placeholder="Waarde..." value="${esc(c.value||'')}" style="font-size:13px" list="opts_${ci}">
              ${hasOptions ? `<datalist id="opts_${ci}">${ifField.options.map(o=>`<option value="${esc(o)}">`).join('')}</datalist>` : ''}

            <select class="form-control cond-then-field" data-ci="${ci}" style="flex:2;min-width:140px;font-size:13px">
              <option value="">-- Kies veld --</option>
              ${targetFields.filter(f => f.id !== c.ifFieldId).map(f => `<option value="${f.id}" ${c.thenFieldId===f.id?'selected':''}>${esc(f.label.split('\n')[0])}</option>`).join('')}
            </select>
            <button class="btn btn-danger btn-sm cond-del-btn" data-ci="${ci}" style="flex-shrink:0">🗑</button>
          </div>`;
        }).join('')}
      </div>`}

      <button class="btn btn-outline btn-sm" id="addConditionBtn" style="margin-top:12px;border-color:#F0C040;color:#92400E">+ Regel toevoegen</button>
      <div style="font-size:11px;color:#B45309;margin-top:10px;opacity:0.8">
        💡 Velden die in een "TOON"-regel staan zijn standaard verborgen. Ze worden zichtbaar zodra de bijbehorende voorwaarde geldt.
      </div>
    </div>
  </div>`;
}

function renderFormPreviewContent() {
  const bs = S.builderState;
  if (!bs) return '';
  const fields = bs.fields || [];

  const typeIcon = { text:'Aa', textarea:'📝', number:'#', email:'✉', phone:'📞', date:'📅',
    multiselect:'⊙', checkbox:'☑', list:'≡', photo:'📷', signature:'✍', heading:'', divider:'' };

  const fieldHtml = fields.map(f => {
    if (f.type === 'divider') {
      return `<div style="padding:6px 14px"><hr style="border:none;border-top:2px solid #E8EFF6"></div>`;
    }
    if (f.type === 'heading') {
      const lines = (f.label || 'Koptekst').split('\n');
      const title = lines[0] || 'Koptekst';
      const body  = lines.slice(1).join('\n').trim();
      return `<div style="background:linear-gradient(135deg,#dbeafe,#eff6ff);margin:8px 10px;border-radius:10px;padding:10px 12px">
        <div style="font-size:12px;font-weight:900;color:#1d4ed8">${esc(title)}</div>
        ${body ? `<div style="font-size:11px;color:#374151;margin-top:4px;white-space:pre-line">${esc(body)}</div>` : ''}
      </div>`;
    }
    const label = f.label || `(${f.type})`;
    const req   = f.required ? '<span style="color:#D64545"> *</span>' : '';
    let input = '';
    if (f.type === 'textarea') {
      input = `<div class="preview-input" style="min-height:48px;color:#C0CCD8;font-style:italic;font-size:11px">Tekstvak...</div>`;
    } else if (f.type === 'multiselect' && f.options?.length) {
      input = f.options.map(o => `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#64748B"><span style="width:12px;height:12px;border-radius:50%;border:1.5px solid #C0CCD8;display:inline-block;flex-shrink:0"></span>${esc(o)}</div>`).join('');
    } else if (f.type === 'checkbox' && f.options?.length) {
      input = f.options.map(o => `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#64748B"><span style="width:12px;height:12px;border-radius:3px;border:1.5px solid #C0CCD8;display:inline-block;flex-shrink:0"></span>${esc(o)}</div>`).join('');
    } else if (f.type === 'photo') {
      input = `<div style="border:1.5px dashed #C0CCD8;border-radius:8px;padding:12px;text-align:center;font-size:11px;color:#94A3B8">📷 Foto toevoegen</div>`;
    } else if (f.type === 'signature') {
      input = `<div style="border:1.5px dashed #C0CCD8;border-radius:8px;padding:12px;text-align:center;font-size:11px;color:#94A3B8">✍ Handtekening</div>`;
    } else if (f.type === 'date') {
      input = `<div class="preview-input">dd-mm-jjjj</div>`;
    } else {
      input = `<div class="preview-input">${esc(f.label || '...')}</div>`;
    }
    return `<div class="preview-field">
      <div class="preview-label">${esc(label)}${req}</div>
      ${input}
    </div>`;
  }).join('');

  return `
    <div class="preview-form-title">${esc(bs.name || 'Formulier')}</div>
    ${fields.length === 0
      ? `<div style="padding:24px;text-align:center;color:#94A3B8;font-size:12px">Nog geen velden toegevoegd</div>`
      : fieldHtml}
    <div style="padding:12px 14px">
      <div style="background:linear-gradient(135deg,#0057B8,#2D82E8);color:white;border-radius:10px;padding:10px;text-align:center;font-size:13px;font-weight:800">✉ Verzenden</div>
    </div>`;
}

function updatePreview() {
  const pane = document.getElementById('previewPane');
  if (pane) pane.innerHTML = renderFormPreviewContent();
}

function bindFormBuilder() {
  document.getElementById('backFromBuilder')?.addEventListener('click', () => {
    S.editingForm = null; S.builderState = null; S.error = null; render();
  });

  // Sync base fields
  document.getElementById('bs_name')?.addEventListener('input', e => { S.builderState.name = e.target.value; updatePreview(); });
  document.getElementById('bs_email')?.addEventListener('input', e => S.builderState.email = e.target.value);
  document.querySelectorAll('input[name="bs_mode"]').forEach(r => r.addEventListener('change', e => {
    S.builderState.mode = e.target.value; render();
  }));

  // Allowed users
  document.querySelectorAll('.au-check').forEach(cb =>
    cb.addEventListener('change', () => {
      S.builderState.allowedUsers = Array.from(document.querySelectorAll('.au-check:checked')).map(c => c.dataset.uid);
    })
  );

  // ── DRAG & DROP ──────────────────────────────────────────────
  let dragData = null;

  // Sidebar items → drag new field type
  document.querySelectorAll('.field-type-item[draggable]').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragData = { kind: 'new', fieldType: el.dataset.fieldtype };
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'copy';
    });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); });
  });

  // Existing field cards → drag to reorder
  document.querySelectorAll('.field-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragData = { kind: 'move', fromIdx: parseInt(card.dataset.idx) };
      card.classList.add('dragging-card');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging-card'));
  });

  // Drop zones
  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-active');
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-active');
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-active');
      const pos = parseInt(zone.dataset.pos);
      if (!dragData) return;

      if (dragData.kind === 'new') {
        const newField = { id: 'f_' + Date.now(), type: dragData.fieldType, label: '', required: false, options: [] };
        S.builderState.fields.splice(pos, 0, newField);
      } else if (dragData.kind === 'move') {
        const from = dragData.fromIdx;
        if (from === pos || from === pos - 1) { dragData = null; return; }
        const [moved] = S.builderState.fields.splice(from, 1);
        const insertAt = pos > from ? pos - 1 : pos;
        S.builderState.fields.splice(insertAt, 0, moved);
      }
      dragData = null;
      render();
    });
  });
  // ─────────────────────────────────────────────────────────────

  // Field controls
  document.querySelectorAll('.dup-field-btn').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.idx);
    const copy = JSON.parse(JSON.stringify(S.builderState.fields[i]));
    copy.id = 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
    S.builderState.fields.splice(i + 1, 0, copy);
    render();
  }));
  document.querySelectorAll('.del-field-btn').forEach(b => b.addEventListener('click', () => {
    S.builderState.fields.splice(parseInt(b.dataset.idx), 1); render();
  }));
  document.querySelectorAll('.move-up-btn').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.idx);
    [S.builderState.fields[i-1], S.builderState.fields[i]] = [S.builderState.fields[i], S.builderState.fields[i-1]]; render();
  }));
  document.querySelectorAll('.move-down-btn').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.idx);
    [S.builderState.fields[i+1], S.builderState.fields[i]] = [S.builderState.fields[i], S.builderState.fields[i+1]]; render();
  }));
  document.querySelectorAll('.field-label').forEach(inp => inp.addEventListener('input', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].label = e.target.value;
    // Update header without full re-render
    const card = inp.closest('.field-card');
    if (card) { const h = card.querySelector('strong'); if (h) h.textContent = e.target.value || 'Naamloos veld'; }
    updatePreview();
  }));
  document.querySelectorAll('.field-type').forEach(sel => sel.addEventListener('change', e => {
    const idx = parseInt(e.target.dataset.idx);
    S.builderState.fields[idx].type = e.target.value;
    if (!['multiselect','checkbox'].includes(e.target.value)) S.builderState.fields[idx].options = [];
    if (e.target.value !== 'list') delete S.builderState.fields[idx].listId;
    render();
  }));
  document.querySelectorAll('.field-required').forEach(cb => cb.addEventListener('change', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].required = e.target.checked;
  }));
  document.querySelectorAll('.field-listid').forEach(sel => sel.addEventListener('change', e => {
    S.builderState.fields[parseInt(e.target.dataset.idx)].listId = e.target.value;
  }));

  // Conditions editor
  document.getElementById('openConditionsBtn')?.addEventListener('click', () => {
    S.showConditions = true; render();
  });
  document.getElementById('closeConditionsBtn')?.addEventListener('click', () => {
    S.showConditions = false; render();
  });
  document.getElementById('addConditionBtn')?.addEventListener('click', () => {
    if (!S.builderState.conditions) S.builderState.conditions = [];
    S.builderState.conditions.push({ id: 'c_' + Date.now(), ifFieldId: '', operator: 'equals', value: '', thenFieldId: '' });
    render();
  });
  document.querySelectorAll('.cond-del-btn').forEach(b => b.addEventListener('click', () => {
    const ci = parseInt(b.dataset.ci);
    S.builderState.conditions.splice(ci, 1); render();
  }));
  document.querySelectorAll('.cond-if-field').forEach(sel => sel.addEventListener('change', e => {
    S.builderState.conditions[parseInt(e.target.dataset.ci)].ifFieldId = e.target.value; render();
  }));
  document.querySelectorAll('.cond-operator').forEach(sel => sel.addEventListener('change', e => {
    S.builderState.conditions[parseInt(e.target.dataset.ci)].operator = e.target.value; render();
  }));
  document.querySelectorAll('.cond-value').forEach(inp => inp.addEventListener('input', e => {
    S.builderState.conditions[parseInt(e.target.dataset.ci)].value = e.target.value;
  }));
  document.querySelectorAll('.cond-then-field').forEach(sel => sel.addEventListener('change', e => {
    S.builderState.conditions[parseInt(e.target.dataset.ci)].thenFieldId = e.target.value; render();
  }));

  // Options
  document.querySelectorAll('.add-opt-btn').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.idx);
    if (!S.builderState.fields[idx].options) S.builderState.fields[idx].options = [];
    S.builderState.fields[idx].options.push(''); render();
  }));
  document.querySelectorAll('.del-opt-btn').forEach(b => b.addEventListener('click', () => {
    S.builderState.fields[parseInt(b.dataset.fidx)].options.splice(parseInt(b.dataset.oi), 1); render();
  }));
  document.querySelectorAll('.opt-val').forEach(inp => inp.addEventListener('input', e => {
    S.builderState.fields[parseInt(e.target.dataset.fidx)].options[parseInt(e.target.dataset.oi)] = e.target.value;
    updatePreview();
  }));

  // Save
  document.getElementById('saveFormBtn')?.addEventListener('click', saveForm);
}

async function saveForm() {
  const bs = S.builderState;
  if (!bs.name.trim()) { S.error = 'Formuliernaam is verplicht'; render(); return; }
  if (!bs.email.trim()) { S.error = 'E-mailadres is verplicht'; render(); return; }
  S.loading = true; S.error = null; render();

  try {
    let savedForm;
    if (S.editingForm === 'new') {
      savedForm = await api('POST', '/api/admin/forms', { name: bs.name, email: bs.email, fields: bs.fields, conditions: bs.conditions || [] });
    } else {
      savedForm = await api('PUT', `/api/admin/forms/${S.editingForm}`, { name: bs.name, email: bs.email, fields: bs.fields, conditions: bs.conditions || [] });
    }

    // Update allowed users
    const allMonteurs = S.users.filter(u => u.role !== 'admin');
    await Promise.all(allMonteurs.map(async u => {
      const shouldHave = bs.allowedUsers.includes(u.id);
      const hasIt = u.allowedForms?.includes(savedForm.id);
      if (shouldHave && !hasIt) {
        const updated = await api('PUT', `/api/admin/users/${u.id}`, { allowedForms: [...(u.allowedForms||[]), savedForm.id] });
        const idx = S.users.findIndex(x => x.id === u.id); if (idx !== -1) S.users[idx] = updated;
      } else if (!shouldHave && hasIt) {
        const updated = await api('PUT', `/api/admin/users/${u.id}`, { allowedForms: (u.allowedForms||[]).filter(id => id !== savedForm.id) });
        const idx = S.users.findIndex(x => x.id === u.id); if (idx !== -1) S.users[idx] = updated;
      }
    }));

    await loadAdminData();
    S.editingForm = null; S.builderState = null; S.loading = false;
    S.success = `Formulier "${bs.name}" opgeslagen!`; S.adminTab = 'forms'; render();
  } catch(e) { S.error = e.message; S.loading = false; render(); }
}

// --- ADMIN SUBMISSIONS ---
function renderAdminSubmissions() {
  const subs = S.allSubmissions || [];
  const [filterForm, setFilterForm] = [S.subFilterForm || '', v => S.subFilterForm = v];
  const [filterUser, setFilterUser] = [S.subFilterUser || '', v => S.subFilterUser = v];
  const forms = S.forms;
  const users = S.users.filter(u => u.role !== 'admin');

  const filtered = subs.filter(s => {
    if (filterForm && s.formId !== filterForm) return false;
    if (filterUser && s.userId !== filterUser) return false;
    return true;
  });

  return `
  <div class="section-header">
    <h2 class="section-title">Inzendingen <span style="font-size:13px;font-weight:400;color:var(--text-muted)">${filtered.length} van ${subs.length}</span></h2>

    <select class="form-control" id="subFilterForm" style="max-width:220px;padding:8px 12px">

  ${filtered.length === 0 ? `
    <div class="empty"><div class="empty-icon">📥</div>
    <p class="empty-text">Geen inzendingen gevonden</p></div>` : `
  <div class="card" style="padding:0;overflow:hidden">

      <table>

function bindAdminLists() {
  const zone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('listFile');

  zone?.addEventListener('click', () => fileInput?.click());
  fileInput?.addEventListener('change', () => {
    document.getElementById('selectedFileName').textContent = fileInput.files[0]?.name || '';
  });

  ['dragover','dragleave','drop'].forEach(evt => zone?.addEventListener(evt, e => {
    e.preventDefault();
    if (evt === 'dragover') zone.classList.add('dragover');
    else if (evt === 'dragleave') zone.classList.remove('dragover');
    else { zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; document.getElementById('selectedFileName').textContent = e.dataTransfer.files[0].name; } }
  }));

  document.getElementById('uploadListBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('listName')?.value?.trim();
    const file = fileInput?.files[0];
    if (!file) { S.error = 'Selecteer eerst een bestand'; render(); return; }
    S.loading = true; S.error = null; render();
    try {
      const fd = new FormData();
      fd.append('file', file);
      if (name) fd.append('name', name);
      const newList = await api('POST', '/api/admin/lists/upload', fd, true);
      S.lists.push(newList);
      S.success = `Lijst "${newList.name}" geüpload met ${newList.count} items!`;
      S.loading = false; render();
    } catch(e) { S.error = e.message; S.loading = false; render(); }
  });

  document.querySelectorAll('.rename-list-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'renameList', id: b.dataset.id, currentName: b.dataset.name };
    render();
  }));

  document.querySelectorAll('.del-list-btn').forEach(b => b.addEventListener('click', () => {
    S.modal = { type: 'confirm', title: 'Lijst verwijderen', message: `Weet je zeker dat je <strong>${b.dataset.name}</strong> wilt verwijderen?`, action: 'deleteList', id: b.dataset.id };
    render();
  }));
}

function bindModal() {
  const m = S.modal;
  const close = () => { S.modal = null; S.error = null; render(); };
  document.getElementById('modalClose')?.addEventListener('click', close);
  document.getElementById('modalClose2')?.addEventListener('click', close);
  document.getElementById('modalOverlay')?.addEventListener('click', e => { if (e.target.id === 'modalOverlay') close(); });

  if (m.type === 'confirm') {
    document.getElementById('modalConfirm')?.addEventListener('click', async () => {
      try {
        if (m.action === 'deleteForm') {
          await api('DELETE', `/api/admin/forms/${m.id}`);
          S.forms = S.forms.filter(f => f.id !== m.id);
          S.success = 'Formulier verwijderd.';
        } else if (m.action === 'deleteUser') {
          await api('DELETE', `/api/admin/users/${m.id}`);
          S.users = S.users.filter(u => u.id !== m.id);
          S.success = 'Gebruiker verwijderd.';
        } else if (m.action === 'deleteList') {
          await api('DELETE', `/api/admin/lists/${m.id}`);
          S.lists = S.lists.filter(l => l.id !== m.id);
          S.success = 'Lijst verwijderd.';
        }
        S.modal = null; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'userForm') {
    document.getElementById('modalSaveUser')?.addEventListener('click', async () => {
      const name = document.getElementById('mu_name')?.value?.trim();
      const username = document.getElementById('mu_username')?.value?.trim();
      const pass = document.getElementById('mu_pass')?.value;
      const allowedForms = Array.from(document.querySelectorAll('.mu-form-check:checked')).map(c => c.dataset.fid);
      if (!name || !username) { S.error = 'Vul naam en gebruikersnaam in'; render(); return; }
      if (!m.user && !pass) { S.error = 'Wachtwoord is verplicht voor nieuwe gebruikers'; render(); return; }
      try {
        const payload = { name, username, role: 'monteur', allowedForms, ...(pass ? { password: pass } : {}) };
        let saved;
        if (m.user) { saved = await api('PUT', `/api/admin/users/${m.user.id}`, payload); S.users = S.users.map(u => u.id === saved.id ? saved : u); }
        else { saved = await api('POST', '/api/admin/users', payload); S.users.push(saved); }
        S.modal = null; S.success = `Gebruiker "${name}" opgeslagen.`; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'resetPw') {
    document.getElementById('modalResetPwBtn')?.addEventListener('click', async () => {
      const pw = document.getElementById('adminNewPw')?.value;
      const pw2 = document.getElementById('adminNewPw2')?.value;
      if (!pw) { S.error = 'Vul een wachtwoord in'; render(); return; }
      if (pw !== pw2) { S.error = 'Wachtwoorden komen niet overeen'; render(); return; }
      try {
        await api('POST', `/api/admin/users/${m.userId}/reset-password`, { password: pw });
        S.modal = null; S.success = 'Wachtwoord succesvol gewijzigd.'; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }

  if (m.type === 'renameList') {
    document.getElementById('modalRenameList')?.addEventListener('click', async () => {
      const newName = document.getElementById('newListName')?.value?.trim();
      if (!newName) return;
      try {
        const updated = await api('PUT', `/api/admin/lists/${m.id}`, { name: newName });
        S.lists = S.lists.map(l => l.id === m.id ? { ...l, name: newName } : l);
        S.modal = null; S.success = 'Lijstnaam bijgewerkt.'; render();
      } catch(e) { S.error = e.message; render(); }
    });
  }
}

      </div>`}` : ''}
    ${S.monteurTab === 'history' ? `
      <div class="section-header"><h2 class="section-title">Mijn inzendingen</h2></div>
      ${S.mySubmissions.length === 0 ? `
        <div class="empty" style="margin-top:48px">
          <div class="empty-icon">🕓</div>
          <p class="empty-text">Nog geen inzendingen</p>
          <p class="empty-sub">Ingevulde formulieren verschijnen hier.</p>
        </div>` : `
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Formulier</th><th>Datum</th><th>Tijd</th><th>Foto's</th><th>Handtekening</th></tr></thead>
            <tbody>
              ${S.mySubmissions.map(s => {
                const d = new Date(s.submittedAt);
                const datum = d.toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric' });
                const tijd = d.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
                return `<tr class="submission-row" data-sid="${s.id}" style="cursor:pointer">

        </div>
      </div>`}` : ''}
    ${S.monteurTab === 'profile' ? renderMonteurProfile() : ''}
  </div>
  ${S.modal ? renderModal() : ''}`;
}
